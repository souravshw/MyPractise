<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Engineering Notes</title>
  <link rel="canonical" href="https://enggnotes.com/contact.html">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [{
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "https://enggnotes.com/index.html"
    },{
      "@type": "ListItem",
      "position": 2,
      "name": "Contact Us",
      "item": "https://enggnotes.com/contact.html"
    }]
  }
  </script>
  <meta name="description" content="Get in touch with Engineering Notes. Send us questions, feedback, or content suggestions.">
  <meta name="keywords" content="contact engineering notes, developer blog feedback">

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="Contact Us | Engineering Notes">
  <meta property="og:description" content="Get in touch with Engineering Notes. Send us questions or suggestions.">
  <meta property="og:type" content="website">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Navigation Header -->
  <header class="main-header" id="main-header" data-path-prefix="" data-active-nav="contact"></header>

  <!-- Main Container -->
  <main class="container" style="max-width: 700px;">
    
    <!-- Breadcrumb Nav -->
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <ol>
        <li><a href="index.html">Home</a></li>
        <li aria-current="page">Contact Us</li>
      </ol>
    </nav>
    
    <header style="margin-bottom: 2rem; text-align: center;">
      <h1 style="font-size: 2.25rem; font-weight: 800; margin-bottom: 0.5rem; color: var(--text-primary);">Get In Touch</h1>
      <p style="color: var(--text-secondary); font-size: 1.05rem;">Have questions, feedback, or a suggestion for our next simple walkthrough? Send us a message!</p>
    </header>

    <!-- Contact Form Card -->
    <div class="form-card">
      <form id="contact-form">
        <div class="form-group">
          <label for="contact-name">Name</label>
          <input type="text" id="contact-name" class="form-control" placeholder="John Doe" required autocomplete="name">
        </div>
        
        <div class="form-group">
          <label for="contact-email">Email Address</label>
          <input type="email" id="contact-email" class="form-control" placeholder="john@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="contact-message">Your Message</label>
          <textarea id="contact-message" class="form-control" placeholder="What's on your mind?..." required></textarea>
        </div>

        <button type="submit" class="btn-primary" id="btn-submit-contact">
          <span>Send Message</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </form>
    </div>

  </main>

  <!-- Success Toast Notification -->
  <div class="toast-notification" id="success-toast">
    <div class="toast-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <span>Message sent successfully!</span>
  </div>

  <!-- Footer Section -->
  <footer class="main-footer" id="main-footer" data-path-prefix=""></footer>

  <!-- Script for dynamic fragments -->
  <script src="js/fragments.js"></script>

  <!-- Simulation script for static submissions -->
  <script>
    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const toast = document.getElementById('success-toast');
      
      // Show success notification
      toast.classList.add('show');
      
      // Clear inputs
      document.getElementById('contact-name').value = '';
      document.getElementById('contact-email').value = '';
      document.getElementById('contact-message').value = '';
      
      // Hide notification after 4 seconds
      setTimeout(() => {
        toast.classList.remove('show');
      }, 4000);
    });
  </script>

</body>
</html>
