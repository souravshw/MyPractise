<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>
  <text x="400" y="50" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">BigDecimal vs. Double</text>
  <text x="400" y="75" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5" text-anchor="middle">Comparing floating-point approximations with exact decimal representation</text>

  <!-- Double card (Binary Floating Point) -->
  <g transform="translate(80, 140)">
    <rect width="280" height="230" rx="8" fill="#22111A" stroke="#FF5E5E" stroke-width="1.5"/>
    <text x="140" y="30" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#FF5E5E" text-anchor="middle">Double / Float (Binary Approx.)</text>
    
    <text x="30" y="75" font-family="monospace" font-size="13" fill="#D2C8E3">0.1 + 0.2 =</text>
    <text x="30" y="105" font-family="monospace" font-size="20" font-weight="bold" fill="#FF8E8E">0.30000000000000004</text>
    
    <rect x="20" y="140" width="240" height="70" rx="4" fill="#140F27" stroke="#3D2B3D" stroke-width="1"/>
    <text x="140" y="165" font-family="'Segoe UI', sans-serif" font-size="12" fill="#FFA5A5" text-anchor="middle">Stores numbers in base-2 fractions.</text>
    <text x="140" y="185" font-family="'Segoe UI', sans-serif" font-size="12" fill="#FFA5A5" text-anchor="middle">Cannot exactly represent 1/10 (0.1).</text>
  </g>

  <!-- BigDecimal card (Exact Decimal) -->
  <g transform="translate(440, 140)">
    <rect width="280" height="230" rx="8" fill="#0C2518" stroke="#00FF87" stroke-width="1.5"/>
    <text x="140" y="30" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#00FF87" text-anchor="middle">BigDecimal (Exact Representation)</text>
    
    <text x="30" y="75" font-family="monospace" font-size="13" fill="#D2C8E3">0.1 + 0.2 =</text>
    <text x="30" y="105" font-family="monospace" font-size="22" font-weight="bold" fill="#8EFFA5">0.3</text>
    
    <rect x="20" y="140" width="240" height="70" rx="4" fill="#140F27" stroke="#253D2F" stroke-width="1"/>
    <text x="140" y="165" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8EFFA5" text-anchor="middle">Stores scale and unscaled integer.</text>
    <text x="140" y="185" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8EFFA5" text-anchor="middle">Perfect for currency / banking.</text>
  </g>
</svg>
