<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>
  <text x="400" y="50" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">Collections.shuffle() Operation</text>
  <text x="400" y="75" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5" text-anchor="middle">Randomizing element placements in a List</text>

  <!-- Ordered List -->
  <g transform="translate(80, 160)">
    <text x="0" y="-15" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5">Ordered Input List</text>
    
    <rect x="0" y="0" width="50" height="70" rx="4" fill="#140F27" stroke="#3A2075" stroke-width="1.5"/>
    <text x="25" y="42" font-family="monospace" font-size="20" fill="#D2C8E3" text-anchor="middle">A</text>
    
    <rect x="60" y="0" width="50" height="70" rx="4" fill="#140F27" stroke="#3A2075" stroke-width="1.5"/>
    <text x="85" y="42" font-family="monospace" font-size="20" fill="#D2C8E3" text-anchor="middle">B</text>

    <rect x="120" y="0" width="50" height="70" rx="4" fill="#140F27" stroke="#3A2075" stroke-width="1.5"/>
    <text x="145" y="42" font-family="monospace" font-size="20" fill="#D2C8E3" text-anchor="middle">C</text>

    <rect x="180" y="0" width="50" height="70" rx="4" fill="#140F27" stroke="#3A2075" stroke-width="1.5"/>
    <text x="205" y="42" font-family="monospace" font-size="20" fill="#D2C8E3" text-anchor="middle">D</text>
  </g>

  <!-- Random Shuffling arrows -->
  <g transform="translate(350, 160)">
    <!-- Swirling arrows or lines to represent shuffling -->
    <path d="M 0 35 C 40 10, 60 70, 100 45" fill="none" stroke="#FF5E5E" stroke-width="2" stroke-dasharray="4"/>
    <path d="M 0 15 C 30 65, 70 -15, 100 25" fill="none" stroke="#00FF87" stroke-width="2" stroke-dasharray="4"/>
    <text x="50" y="-10" font-family="'Segoe UI', sans-serif" font-size="12" fill="#E2D6FF" text-anchor="middle">Shuffle Action</text>
  </g>

  <!-- Shuffled List -->
  <g transform="translate(480, 160)">
    <text x="0" y="-15" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5">Shuffled Output List</text>
    
    <rect x="0" y="0" width="50" height="70" rx="4" fill="#1A182E" stroke="#00FF87" stroke-width="1.5"/>
    <text x="25" y="42" font-family="monospace" font-size="20" fill="#00FF87" text-anchor="middle">C</text>
    
    <rect x="60" y="0" width="50" height="70" rx="4" fill="#1A182E" stroke="#00FF87" stroke-width="1.5"/>
    <text x="85" y="42" font-family="monospace" font-size="20" fill="#00FF87" text-anchor="middle">A</text>

    <rect x="120" y="0" width="50" height="70" rx="4" fill="#1A182E" stroke="#00FF87" stroke-width="1.5"/>
    <text x="145" y="42" font-family="monospace" font-size="20" fill="#00FF87" text-anchor="middle">D</text>

    <rect x="180" y="0" width="50" height="70" rx="4" fill="#1A182E" stroke="#00FF87" stroke-width="1.5"/>
    <text x="205" y="42" font-family="monospace" font-size="20" fill="#00FF87" text-anchor="middle">B</text>
  </g>
</svg>
