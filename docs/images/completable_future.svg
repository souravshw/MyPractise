<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Glowing effect filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="url(#bg-grad)" />
  <rect width="796" height="446" x="2" y="2" rx="14" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2" />

  <!-- Title -->
  <text x="400" y="45" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" letter-spacing="1">
    JAVA COMPLETABLEFUTURE PIPELINE
  </text>
  <text x="400" y="70" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    Asynchronous Task Composition: Combining Parallel Pipelines (thenCombine)
  </text>

  <!-- Connection Lines (Paths) -->
  <!-- Top Pipeline Path -->
  <path d="M 280,180 L 400,180 L 460,250" fill="none" stroke="#f97316" stroke-width="3" filter="url(#glow-orange)" opacity="0.8" />
  <!-- Bottom Pipeline Path -->
  <path d="M 280,320 L 400,320 L 460,250" fill="none" stroke="#38bdf8" stroke-width="3" filter="url(#glow-blue)" opacity="0.8" />
  <!-- Combined Output Path -->
  <path d="M 540,250 L 640,250" fill="none" stroke="#a855f7" stroke-width="4" filter="url(#glow-purple)" />

  <!-- Node 1: Task A (Top Async) -->
  <g transform="translate(80, 140)">
    <rect width="200" height="80" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="2" />
    <text x="15" y="30" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f97316">CompletableFuture A</text>
    <text x="15" y="50" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#e2e8f0">supplyAsync(() -> Chop Veggies)</text>
    <text x="15" y="68" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8" font-style="italic">Executes in ForkJoinPool</text>
  </g>

  <!-- Node 2: Task B (Bottom Async) -->
  <g transform="translate(80, 280)">
    <rect width="200" height="80" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2" />
    <text x="15" y="30" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="bold" fill="#38bdf8">CompletableFuture B</text>
    <text x="15" y="50" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#e2e8f0">supplyAsync(() -> Boil Pasta)</text>
    <text x="15" y="68" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8" font-style="italic">Executes in Parallel</text>
  </g>

  <!-- Node 3: Combine Node (Center) -->
  <g transform="translate(420, 210)">
    <rect width="120" height="80" rx="40" fill="#a855f7" stroke="#c084fc" stroke-width="2" filter="url(#glow-purple)" />
    <text x="60" y="38" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">thenCombine()</text>
    <text x="60" y="55" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#f3e8ff" text-anchor="middle">Combine Results</text>
  </g>

  <!-- Node 4: Final Outcome (Right) -->
  <g transform="translate(620, 210)">
    <rect width="140" height="80" rx="10" fill="#0f172a" stroke="#a855f7" stroke-width="2" />
    <text x="70" y="35" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Final Result</text>
    <text x="70" y="55" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#c084fc" text-anchor="middle">Completed Meal</text>
    <text x="70" y="68" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">(Veggies + Pasta Plated)</text>
  </g>
</svg>
