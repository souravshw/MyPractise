<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <!-- Node Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#38bdf8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="url(#bg-grad)" />
  <rect width="796" height="446" x="2" y="2" rx="14" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" />

  <!-- Title -->
  <text x="400" y="45" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" letter-spacing="1">
    DYNAMICALLY RESIZING ARRAY LIST
  </text>
  <text x="400" y="70" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    How ArrayList expands its backing storage array on demand
  </text>

  <!-- Step 1: Array Full -->
  <g transform="translate(100, 110)">
    <text x="0" y="25" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#fb7185">1. OLD ARRAY (Capacity = 10, Count = 10)</text>
    <g transform="translate(0, 45)">
      <!-- 10 small cells -->
      <rect x="0" width="35" height="35" rx="4" fill="#1e293b" stroke="#f43f5e" stroke-width="1.5" />
      <text x="17.5" y="22" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">A</text>
      
      <rect x="40" width="35" height="35" rx="4" fill="#1e293b" stroke="#f43f5e" stroke-width="1.5" />
      <text x="57.5" y="22" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">B</text>

      <rect x="80" width="35" height="35" rx="4" fill="#1e293b" stroke="#f43f5e" stroke-width="1.5" />
      <text x="97.5" y="22" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">C</text>

      <text x="140" y="22" font-family="'Inter', system-ui, sans-serif" font-size="16" fill="#64748b">...</text>
      
      <rect x="180" width="35" height="35" rx="4" fill="#1e293b" stroke="#f43f5e" stroke-width="1.5" />
      <text x="197.5" y="22" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">J</text>

      <text x="235" y="22" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fb7185">FULL!</text>
    </g>
  </g>

  <!-- Copy Arrows -->
  <path d="M 120 200 L 120 250" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-dasharray="3,3" marker-end="url(#arrow)" />
  <path d="M 290 200 L 290 250" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-dasharray="3,3" marker-end="url(#arrow)" />
  <text x="205" y="235" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#38bdf8" text-anchor="middle" font-weight="600">Copying Elements...</text>

  <!-- Step 2: New Array Created -->
  <g transform="translate(100, 260)">
    <text x="0" y="25" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#34d399">2. NEW EXPANDED ARRAY (Capacity = 20)</text>
    <g transform="translate(0, 45)">
      <!-- Copied cells -->
      <rect x="0" width="35" height="35" rx="4" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5" />
      <text x="17.5" y="22" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#fff" text-anchor="middle">A</text>
      
      <rect x="40" width="35" height="35" rx="4" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5" />
      <text x="65" y="22" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#fff" text-anchor="middle">B</text>

      <rect x="80" width="35" height="35" rx="4" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5" />
      <text x="97.5" y="22" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#fff" text-anchor="middle">C</text>

      <text x="140" y="22" font-family="'Inter', system-ui, sans-serif" font-size="16" fill="#64748b">...</text>

      <rect x="180" width="35" height="35" rx="4" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5" />
      <text x="197.5" y="22" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#fff" text-anchor="middle">J</text>

      <!-- New elements slotted -->
      <rect x="230" width="35" height="35" rx="4" fill="#064e3b" stroke="#10b981" stroke-width="2" filter="url(#glow)" />
      <text x="247.5" y="22" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">K</text>
      <text x="247.5" y="55" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#34d399" font-weight="bold" text-anchor="middle">NEW</text>

      <!-- Rest of empty slots -->
      <rect x="280" width="35" height="35" rx="4" fill="#0f172a" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
      <rect x="320" width="35" height="35" rx="4" fill="#0f172a" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
      <text x="375" y="22" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#475569">...</text>
    </g>
  </g>

  <!-- Explanation footer card -->
  <rect x="150" y="385" width="500" height="42" rx="8" fill="rgba(30, 41, 59, 0.8)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
  <text x="400" y="411" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="bold" fill="#cbd5e1" text-anchor="middle">
    ArrayList doubles or shifts capacity by 10 and copies over when size equals capacity limit.
  </text>
</svg>
