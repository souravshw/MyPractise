<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="100%" height="100%">
  <!-- Background Slate -->
  <rect width="100%" height="100%" rx="16" fill="#1e293b"/>
  <!-- Decorative Grid Overlay -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>
    <linearGradient id="purple-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>

  <!-- Title -->
  <text x="250" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="16" fill="#f8fafc" text-anchor="middle">Edit Distance DP Grid ("horse" → "ros")</text>

  <!-- Matrix Header String: R O S -->
  <g transform="translate(140, 60)">
    <rect x="0" y="0" width="50" height="40" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
    <text x="25" y="25" font-family="monospace" font-weight="bold" font-size="18" fill="#94a3b8" text-anchor="middle">∅</text>

    <rect x="60" y="0" width="50" height="40" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
    <text x="85" y="25" font-family="monospace" font-weight="bold" font-size="18" fill="#14b8a6" text-anchor="middle">r</text>

    <rect x="120" y="0" width="50" height="40" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
    <text x="145" y="25" font-family="monospace" font-weight="bold" font-size="18" fill="#14b8a6" text-anchor="middle">o</text>

    <rect x="180" y="0" width="50" height="40" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
    <text x="205" y="25" font-family="monospace" font-weight="bold" font-size="18" fill="#14b8a6" text-anchor="middle">s</text>
  </g>

  <!-- Matrix Left String: h o r s e -->
  <g transform="translate(70, 110)" font-family="monospace" font-weight="bold" font-size="18" fill="#8b5cf6">
    <rect x="0" y="0" width="50" height="40" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
    <text x="25" y="25" fill="#94a3b8" text-anchor="middle">∅</text>

    <rect x="0" y="45" width="50" height="40" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
    <text x="25" y="70" text-anchor="middle">h</text>

    <rect x="0" y="90" width="50" height="40" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
    <text x="25" y="115" text-anchor="middle">o</text>

    <rect x="0" y="135" width="50" height="40" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
    <text x="25" y="160" text-anchor="middle">r</text>

    <rect x="0" y="180" width="50" height="40" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
    <text x="25" y="205" text-anchor="middle">s</text>
  </g>

  <!-- DP Value Grid Overlay -->
  <g transform="translate(140, 110)" font-family="'Courier New', monospace" font-weight="bold" font-size="16" fill="#f8fafc">
    <!-- Row 0 (empty) -->
    <text x="25" y="25" text-anchor="middle">0</text>
    <text x="85" y="25" text-anchor="middle">1</text>
    <text x="145" y="25" text-anchor="middle">2</text>
    <text x="205" y="25" text-anchor="middle">3</text>

    <!-- Row h -->
    <text x="25" y="70" text-anchor="middle">1</text>
    <text x="85" y="70" text-anchor="middle" fill="#f43f5e">1</text> <!-- Replace h with r -->
    <text x="145" y="70" text-anchor="middle">2</text>
    <text x="205" y="70" text-anchor="middle">3</text>

    <!-- Row o -->
    <text x="25" y="115" text-anchor="middle">2</text>
    <text x="85" y="115" text-anchor="middle">2</text>
    <text x="145" y="115" text-anchor="middle" fill="#10b981">1</text> <!-- Match 'o' -->
    <text x="205" y="115" text-anchor="middle">2</text>

    <!-- Row r -->
    <text x="25" y="160" text-anchor="middle">3</text>
    <text x="85" y="160" text-anchor="middle" fill="#10b981">2</text> <!-- Match 'r' -->
    <text x="145" y="160" text-anchor="middle">2</text>
    <text x="205" y="160" text-anchor="middle">3</text>

    <!-- Row s -->
    <text x="25" y="205" text-anchor="middle">4</text>
    <text x="85" y="205" text-anchor="middle">3</text>
    <text x="145" y="205" text-anchor="middle">3</text>
    <text x="205" y="205" text-anchor="middle" fill="#10b981">2</text> <!-- Match 's' -->
  </g>

  <!-- Grid Boundaries (Visual dividers) -->
  <line x1="130" y1="50" x2="130" y2="330" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <line x1="60" y1="100" x2="360" y2="100" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- Operations Legend -->
  <g transform="translate(380, 120)" font-family="sans-serif" font-size="12">
    <rect x="-10" y="-10" width="120" height="150" rx="8" fill="#1e293b" stroke="rgba(255,255,255,0.05)"/>
    <text x="50" y="15" fill="#94a3b8" font-weight="bold" font-size="13" text-anchor="middle">Operations</text>
    
    <circle cx="10" cy="45" r="5" fill="#f43f5e"/>
    <text x="25" y="49" fill="#e2e8f0">Replace (diag)</text>
    
    <circle cx="10" cy="75" r="5" fill="#3b82f6"/>
    <text x="25" y="79" fill="#e2e8f0">Insert (left)</text>
    
    <circle cx="10" cy="105" r="5" fill="#eab308"/>
    <text x="25" y="109" fill="#e2e8f0">Delete (top)</text>

    <circle cx="10" cy="130" r="5" fill="#10b981"/>
    <text x="25" y="134" fill="#e2e8f0">Match (diag)</text>
  </g>
</svg>
