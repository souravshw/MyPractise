<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Neon Glow Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="url(#bg-grad)" />
  <rect width="796" height="446" x="2" y="2" rx="14" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2" />

  <!-- Title -->
  <text x="400" y="45" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" letter-spacing="1">
    JAVA FORKJOINPOOL MECHANICS
  </text>
  <text x="400" y="70" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    Recursive Task Splitting (Fork) &amp; Result Combination (Join)
  </text>

  <!-- Flow Lines (Forking) -->
  <!-- Main split -->
  <path d="M 180,225 L 240,150" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="4 4" />
  <path d="M 180,225 L 240,300" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="4 4" />
  
  <!-- Subtask 1 split -->
  <path d="M 390,150 L 440,110" fill="none" stroke="#38bdf8" stroke-width="1.5" />
  <path d="M 390,150 L 440,190" fill="none" stroke="#38bdf8" stroke-width="1.5" />
  
  <!-- Subtask 2 split -->
  <path d="M 390,300 L 440,260" fill="none" stroke="#38bdf8" stroke-width="1.5" />
  <path d="M 390,300 L 440,340" fill="none" stroke="#38bdf8" stroke-width="1.5" />

  <!-- Flow Lines (Joining) -->
  <!-- Leaf task results to sub-joins -->
  <path d="M 540,110 L 590,150" fill="none" stroke="#4ade80" stroke-width="1.5" />
  <path d="M 540,190 L 590,150" fill="none" stroke="#4ade80" stroke-width="1.5" />
  <path d="M 540,260 L 590,300" fill="none" stroke="#4ade80" stroke-width="1.5" />
  <path d="M 540,340 L 590,300" fill="none" stroke="#4ade80" stroke-width="1.5" />

  <!-- Sub-joins to main join -->
  <path d="M 690,150 L 740,225" fill="none" stroke="#4ade80" stroke-width="2" filter="url(#glow-green)" />
  <path d="M 690,300 L 740,225" fill="none" stroke="#4ade80" stroke-width="2" filter="url(#glow-green)" />

  <!-- Left: Main Task -->
  <g transform="translate(30, 185)">
    <rect width="150" height="80" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2" filter="url(#glow-cyan)" />
    <text x="75" y="32" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="bold" fill="#38bdf8" text-anchor="middle">Main Task</text>
    <text x="75" y="52" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">Make 4 Sandwiches</text>
    <text x="75" y="68" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Too large! Forking...</text>
  </g>

  <!-- Middle Left: Subtasks (Level 1) -->
  <g transform="translate(240, 110)">
    <rect width="150" height="80" rx="8" fill="#1e293b" stroke="#0284c7" stroke-width="1.5" />
    <text x="75" y="32" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#bae6fd" text-anchor="middle">Subtask 1 (Fork)</text>
    <text x="75" y="52" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">Make 2 Sandwiches</text>
  </g>
  <g transform="translate(240, 260)">
    <rect width="150" height="80" rx="8" fill="#1e293b" stroke="#0284c7" stroke-width="1.5" />
    <text x="75" y="32" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#bae6fd" text-anchor="middle">Subtask 2 (Fork)</text>
    <text x="75" y="52" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">Make 2 Sandwiches</text>
  </g>

  <!-- Middle Right: Leaf Tasks (Level 2 - Direct Execution) -->
  <!-- Top level leaf tasks -->
  <g transform="translate(440, 80)">
    <rect width="100" height="60" rx="6" fill="#0f172a" stroke="#64748b" stroke-width="1" />
    <text x="50" y="28" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Leaf Task 1.1</text>
    <text x="50" y="45" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">1 Sandwich</text>
  </g>
  <g transform="translate(440, 160)">
    <rect width="100" height="60" rx="6" fill="#0f172a" stroke="#64748b" stroke-width="1" />
    <text x="50" y="28" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Leaf Task 1.2</text>
    <text x="50" y="45" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">1 Sandwich</text>
  </g>
  
  <!-- Bottom level leaf tasks -->
  <g transform="translate(440, 230)">
    <rect width="100" height="60" rx="6" fill="#0f172a" stroke="#64748b" stroke-width="1" />
    <text x="50" y="28" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Leaf Task 2.1</text>
    <text x="50" y="45" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">1 Sandwich</text>
  </g>
  <g transform="translate(440, 310)">
    <rect width="100" height="60" rx="6" fill="#0f172a" stroke="#64748b" stroke-width="1" />
    <text x="50" y="28" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Leaf Task 2.2</text>
    <text x="50" y="45" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">1 Sandwich</text>
  </g>

  <!-- Right Side: Joins (Level 1) -->
  <g transform="translate(590, 110)">
    <rect width="100" height="80" rx="8" fill="#1e293b" stroke="#16a34a" stroke-width="1.5" />
    <text x="50" y="32" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#4ade80" text-anchor="middle">Join 1</text>
    <text x="50" y="52" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">2 Sandwiches</text>
  </g>
  <g transform="translate(590, 260)">
    <rect width="100" height="80" rx="8" fill="#1e293b" stroke="#16a34a" stroke-width="1.5" />
    <text x="50" y="32" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#4ade80" text-anchor="middle">Join 2</text>
    <text x="50" y="52" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">2 Sandwiches</text>
  </g>

  <!-- Far Right: Final Join Result -->
  <g transform="translate(710, 185)">
    <circle cx="40" cy="40" r="38" fill="#15803d" stroke="#4ade80" stroke-width="2.5" filter="url(#glow-green)" />
    <text x="40" y="45" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">4 Done</text>
  </g>
</svg>
