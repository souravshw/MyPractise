<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>
  <text x="400" y="50" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">Frequent IP Address Counter</text>
  <text x="400" y="75" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5" text-anchor="middle">Tracking IP occurrences using a Hash Map ledger</text>

  <!-- Incoming Logs stream -->
  <g transform="translate(50, 130)">
    <rect width="180" height="240" rx="6" fill="#140F27" stroke="#3A2075" stroke-width="1.5"/>
    <text x="90" y="30" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#D2C8E3" text-anchor="middle">Raw Server Logs</text>
    
    <rect x="15" y="50" width="150" height="30" rx="4" fill="#1A152E" stroke="#5C42A5" stroke-width="1"/>
    <text x="90" y="70" font-family="monospace" font-size="11" fill="#00FF87">192.168.1.1</text>
    
    <rect x="15" y="90" width="150" height="30" rx="4" fill="#1A152E" stroke="#5C42A5" stroke-width="1"/>
    <text x="90" y="110" font-family="monospace" font-size="11" fill="#E2D6FF">10.0.0.5</text>
    
    <rect x="15" y="130" width="150" height="30" rx="4" fill="#1A152E" stroke="#5C42A5" stroke-width="1"/>
    <text x="90" y="150" font-family="monospace" font-size="11" fill="#00FF87">192.168.1.1</text>

    <rect x="15" y="170" width="150" height="30" rx="4" fill="#1A152E" stroke="#5C42A5" stroke-width="1"/>
    <text x="90" y="190" font-family="monospace" font-size="11" fill="#00FF87">192.168.1.1</text>
  </g>

  <!-- Map Tally ledger -->
  <g transform="translate(310, 130)">
    <rect width="200" height="240" rx="6" fill="#1A182E" stroke="#5C42A5" stroke-width="1.5"/>
    <text x="100" y="30" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#E2D6FF" text-anchor="middle">IP Occurrence Map</text>
    
    <text x="20" y="80" font-family="monospace" font-size="13" fill="#00FF87">192.168.1.1</text>
    <text x="160" y="80" font-family="monospace" font-size="14" fill="#00FF87" font-weight="bold">3 times</text>
    <line x1="20" y1="95" x2="180" y2="95" stroke="#3A2075" stroke-width="1"/>

    <text x="20" y="130" font-family="monospace" font-size="13" fill="#D2C8E3">10.0.0.5</text>
    <text x="160" y="130" font-family="monospace" font-size="14" fill="#D2C8E3" font-weight="bold">1 time</text>
    <line x1="20" y1="145" x2="180" y2="145" stroke="#3A2075" stroke-width="1"/>
  </g>

  <!-- Most Frequent output -->
  <g transform="translate(560, 180)">
    <rect width="190" height="130" rx="8" fill="#120D23" stroke="#00FF87" stroke-width="2"/>
    <text x="95" y="35" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#00FF87" text-anchor="middle">Most Frequent IP</text>
    <text x="95" y="70" font-family="monospace" font-size="15" fill="#F0EBF8" text-anchor="middle">192.168.1.1</text>
    <text x="95" y="100" font-family="'Segoe UI', sans-serif" font-size="12" fill="#887DA5" text-anchor="middle">Max Count: 3</text>
  </g>
</svg>
