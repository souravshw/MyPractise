<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="100%" height="100%">
  <!-- Background Slate -->
  <rect width="100%" height="100%" rx="16" fill="#1e293b"/>
  <!-- Grid overlay -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#14b8a6" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>

  <text x="250" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="16" fill="#f8fafc" text-anchor="middle">Queue Implemented via Two Stacks</text>

  <!-- Stack 1: Input Stack -->
  <g transform="translate(80, 80)">
    <text x="50" y="-15" font-family="sans-serif" font-weight="bold" font-size="13" fill="#94a3b8" text-anchor="middle">Stack 1 (Input)</text>
    
    <!-- Stack container structure (open top) -->
    <path d="M 10 0 L 10 150 L 90 150 L 90 0" fill="none" stroke="#f43f5e" stroke-width="3"/>

    <!-- Stack elements (push goes here) -->
    <g font-family="monospace" font-weight="bold" font-size="16" fill="#f8fafc">
      <!-- Element 3 -->
      <rect x="15" y="30" width="70" height="30" rx="4" fill="#334155" stroke="rgba(255,255,255,0.05)"/>
      <text x="50" y="50" text-anchor="middle">3</text>

      <!-- Element 2 -->
      <rect x="15" y="70" width="70" height="30" rx="4" fill="#334155" stroke="rgba(255,255,255,0.05)"/>
      <text x="50" y="90" text-anchor="middle">2</text>

      <!-- Element 1 -->
      <rect x="15" y="110" width="70" height="30" rx="4" fill="#334155" stroke="rgba(255,255,255,0.05)"/>
      <text x="50" y="130" text-anchor="middle">1</text>
    </g>
    <text x="50" y="175" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Push Target</text>
  </g>

  <!-- Transfer Arrow -->
  <g transform="translate(190, 140)">
    <path d="M 0 0 C 40 -40, 80 -40, 120 0" fill="none" stroke="#14b8a6" stroke-width="3" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
    <text x="60" y="-30" font-family="sans-serif" font-size="11" fill="#14b8a6" font-weight="bold" text-anchor="middle">Transfer on Pop</text>
  </g>

  <!-- Stack 2: Output Stack -->
  <g transform="translate(320, 80)">
    <text x="50" y="-15" font-family="sans-serif" font-weight="bold" font-size="13" fill="#94a3b8" text-anchor="middle">Stack 2 (Output)</text>
    
    <!-- Stack container structure -->
    <path d="M 10 0 L 10 150 L 90 150 L 90 0" fill="none" stroke="#3b82f6" stroke-width="3"/>

    <!-- Stack elements (reverses input order) -->
    <!-- When items are moved from Stack 1, '1' ends up on top of Stack 2 -->
    <g font-family="monospace" font-weight="bold" font-size="16" fill="#f8fafc">
      <!-- Element 1 -->
      <rect x="15" y="30" width="70" height="30" rx="4" fill="#10b981" stroke="rgba(255,255,255,0.05)"/>
      <text x="50" y="50" text-anchor="middle">1</text>

      <!-- Element 2 -->
      <rect x="15" y="70" width="70" height="30" rx="4" fill="#334155" stroke="rgba(255,255,255,0.05)"/>
      <text x="50" y="90" text-anchor="middle">2</text>

      <!-- Element 3 -->
      <rect x="15" y="110" width="70" height="30" rx="4" fill="#334155" stroke="rgba(255,255,255,0.05)"/>
      <text x="50" y="130" text-anchor="middle">3</text>
    </g>
    <text x="50" y="175" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Pop/Peek Source</text>
  </g>

  <!-- Explanation Footer -->
  <g transform="translate(40, 290)" font-family="sans-serif" font-size="12" fill="#94a3b8">
    <text x="210" y="0" font-weight="bold" fill="#f8fafc" text-anchor="middle">How it works:</text>
    <text x="210" y="20" text-anchor="middle">1. Push items directly into the <tspan fill="#f43f5e">Input Stack</tspan> (amortized O(1)).</text>
    <text x="210" y="36" text-anchor="middle">2. On pop/peek, if <tspan fill="#3b82f6">Output Stack</tspan> is empty, shift all elements to reverse order.</text>
  </g>
</svg>
