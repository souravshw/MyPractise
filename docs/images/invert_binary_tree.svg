<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <!-- Background Slate -->
  <rect width="100%" height="100%" rx="16" fill="#1e293b"/>
  <!-- Grid overlay -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>

  <text x="300" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="16" fill="#f8fafc" text-anchor="middle">Invert Binary Tree (Mirroring)</text>

  <!-- Left: Original Tree -->
  <g transform="translate(40, 60)">
    <text x="100" y="0" font-family="sans-serif" font-weight="bold" font-size="13" fill="#94a3b8" text-anchor="middle">Original Tree</text>

    <!-- Connections -->
    <!-- Root to children -->
    <line x1="100" y1="30" x2="60" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <line x1="100" y1="30" x2="140" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <!-- Left child to grandchildren -->
    <line x1="60" y1="90" x2="35" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <line x1="60" y1="90" x2="85" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <!-- Right child to grandchildren -->
    <line x1="140" y1="90" x2="115" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <line x1="140" y1="90" x2="165" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

    <!-- Nodes -->
    <!-- Root: 4 -->
    <circle cx="100" cy="30" r="18" fill="#334155" stroke="#f43f5e" stroke-width="2"/>
    <text x="100" y="35" font-family="monospace" font-weight="bold" font-size="14" fill="#f8fafc" text-anchor="middle">4</text>

    <!-- Left: 2 -->
    <circle cx="60" cy="90" r="16" fill="#334155" stroke="#3b82f6" stroke-width="2"/>
    <text x="60" y="95" font-family="monospace" font-weight="bold" font-size="14" fill="#f8fafc" text-anchor="middle">2</text>

    <!-- Right: 7 -->
    <circle cx="140" cy="90" r="16" fill="#334155" stroke="#10b981" stroke-width="2"/>
    <text x="140" y="95" font-family="monospace" font-weight="bold" font-size="14" fill="#f8fafc" text-anchor="middle">7</text>

    <!-- Grandchildren -->
    <circle cx="35" cy="150" r="14" fill="#1e293b" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="35" y="154" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">1</text>

    <circle cx="85" cy="150" r="14" fill="#1e293b" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="85" y="154" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">3</text>

    <circle cx="115" cy="150" r="14" fill="#1e293b" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="115" y="154" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">6</text>

    <circle cx="165" cy="150" r="14" fill="#1e293b" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="165" y="154" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">9</text>
  </g>

  <!-- Central Mirror Axis -->
  <line x1="300" y1="50" x2="300" y2="250" stroke="#64748b" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="300" y="270" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Mirror Axis</text>

  <!-- Right: Inverted Tree -->
  <g transform="translate(360, 60)">
    <text x="100" y="0" font-family="sans-serif" font-weight="bold" font-size="13" fill="#14b8a6" text-anchor="middle">Inverted Tree</text>

    <!-- Connections -->
    <!-- Root to children -->
    <line x1="100" y1="30" x2="60" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <line x1="100" y1="30" x2="140" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <!-- Left child to grandchildren -->
    <line x1="60" y1="90" x2="35" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <line x1="60" y1="90" x2="85" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <!-- Right child to grandchildren -->
    <line x1="140" y1="90" x2="115" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <line x1="140" y1="90" x2="165" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

    <!-- Nodes (Children are swapped!) -->
    <!-- Root: 4 -->
    <circle cx="100" cy="30" r="18" fill="#334155" stroke="#f43f5e" stroke-width="2"/>
    <text x="100" y="35" font-family="monospace" font-weight="bold" font-size="14" fill="#f8fafc" text-anchor="middle">4</text>

    <!-- Left: 7 -->
    <circle cx="60" cy="90" r="16" fill="#334155" stroke="#10b981" stroke-width="2"/>
    <text x="60" y="95" font-family="monospace" font-weight="bold" font-size="14" fill="#f8fafc" text-anchor="middle">7</text>

    <!-- Right: 2 -->
    <circle cx="140" cy="90" r="16" fill="#334155" stroke="#3b82f6" stroke-width="2"/>
    <text x="140" y="95" font-family="monospace" font-weight="bold" font-size="14" fill="#f8fafc" text-anchor="middle">2</text>

    <!-- Swapped Grandchildren -->
    <circle cx="35" cy="150" r="14" fill="#1e293b" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="35" y="154" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">9</text>

    <circle cx="85" cy="150" r="14" fill="#1e293b" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="85" y="154" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">6</text>

    <circle cx="115" cy="150" r="14" fill="#1e293b" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="115" y="154" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">3</text>

    <circle cx="165" cy="150" r="14" fill="#1e293b" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="165" y="154" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">1</text>
  </g>

  <!-- Explanation Text -->
  <text x="300" y="315" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">
    Recursively swap the left and right child of every node.
  </text>
</svg>
