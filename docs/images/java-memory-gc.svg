<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <!-- Node Glow Filters -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="ref-arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#38bdf8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="url(#bg-grad)" />
  <rect width="796" height="446" x="2" y="2" rx="14" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" />

  <!-- Title -->
  <text x="400" y="45" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" letter-spacing="1">
    JAVA MEMORY MODEL &amp; GARBAGE COLLECTION
  </text>
  <text x="400" y="70" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    Stack reference tracking vs. Heap object reclamation
  </text>

  <!-- 1. STACK MEMORY CARD -->
  <g transform="translate(60, 100)">
    <rect width="220" height="280" rx="10" fill="#1e293b" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1.5" />
    <!-- Header -->
    <rect width="220" height="35" rx="10" fill="#334155" />
    <text x="110" y="22" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#f1f5f9" text-anchor="middle">Stack Memory (Workbench)</text>

    <!-- Stack Frame 2 (Top - prepareDessert) -->
    <g transform="translate(15, 55)">
      <rect width="190" height="90" rx="6" fill="#0f172a" stroke="rgba(255, 255, 255, 0.08)" />
      <rect width="190" height="22" rx="6" fill="#1e3a8a" opacity="0.4" />
      <text x="10" y="15" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6">Frame: prepareDessert()</text>
      <!-- Reference -->
      <text x="15" y="48" font-family="'Courier New', monospace" font-size="12" fill="#94a3b8">Dish</text>
      <text x="50" y="48" font-family="'Courier New', monospace" font-size="12" fill="#38bdf8" font-weight="bold">tempBowl</text>
      <text x="15" y="72" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b">(local reference variable)</text>
    </g>

    <!-- Stack Frame 1 (Bottom - main) -->
    <g transform="translate(15, 160)">
      <rect width="190" height="100" rx="6" fill="#0f172a" stroke="rgba(255, 255, 255, 0.08)" />
      <rect width="190" height="22" rx="6" fill="#312e81" opacity="0.4" />
      <text x="10" y="15" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#6366f1">Frame: main()</text>
      <!-- Reference -->
      <text x="15" y="48" font-family="'Courier New', monospace" font-size="12" fill="#94a3b8">Dish</text>
      <text x="50" y="48" font-family="'Courier New', monospace" font-size="12" fill="#38bdf8" font-weight="bold">mainCourse</text>
      <text x="15" y="75" font-family="'Courier New', monospace" font-size="11" fill="#f43f5e">Lasagna ➔ null</text>
      <text x="15" y="90" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#e2e8f0">(re-assigned to null)</text>
    </g>
  </g>

  <!-- 2. HEAP MEMORY CARD -->
  <g transform="translate(320, 100)">
    <rect width="420" height="280" rx="10" fill="#0f172a" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1.5" />
    <!-- Header -->
    <rect width="420" height="35" rx="10" fill="#1e1b4b" />
    <text x="210" y="22" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#c084fc" text-anchor="middle">Heap Memory (Shared Pantry)</text>

    <!-- Young Generation -->
    <g transform="translate(15, 55)">
      <rect width="180" height="205" rx="8" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.05)" />
      <text x="90" y="20" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#a7f3d0" text-anchor="middle">Young Gen (Eden Space)</text>

      <!-- Reachable Object -->
      <g id="obj-mousse" transform="translate(15, 35)">
        <rect width="150" height="60" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1.5" filter="url(#glow-green)" />
        <text x="75" y="25" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Dish("Mousse")</text>
        <text x="75" y="45" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#34d399" text-anchor="middle">Active / Reachable</text>
      </g>

      <!-- Unreachable Object -->
      <g id="obj-soup" transform="translate(15, 115)">
        <rect width="150" height="60" rx="6" fill="#450a0a" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="4,4" filter="url(#glow-red)" />
        <text x="75" y="25" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#fca5a5" text-anchor="middle">Dish("Old Soup")</text>
        <text x="75" y="45" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#f87171" font-weight="bold" text-anchor="middle">ELIGIBLE FOR GC</text>
      </g>
    </g>

    <!-- Old Generation -->
    <g transform="translate(210, 55)">
      <rect width="195" height="205" rx="8" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.05)" />
      <text x="97.5" y="20" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#c084fc" text-anchor="middle">Old Gen (Tenured)</text>

      <!-- Reachable Object -->
      <g id="obj-spaghetti" transform="translate(20, 35)">
        <rect width="155" height="60" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1.5" filter="url(#glow-green)" />
        <text x="77.5" y="25" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Dish("Spaghetti")</text>
        <text x="77.5" y="45" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#34d399" text-anchor="middle">Active / Reachable</text>
      </g>

      <!-- Unreferenced Object -->
      <g id="obj-lasagna" transform="translate(20, 115)">
        <rect width="155" height="60" rx="6" fill="#450a0a" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="4,4" filter="url(#glow-red)" />
        <text x="77.5" y="25" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#fca5a5" text-anchor="middle">Dish("Lasagna")</text>
        <text x="77.5" y="45" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#f87171" font-weight="bold" text-anchor="middle">ELIGIBLE FOR GC</text>
      </g>
    </g>
  </g>

  <!-- 3. REFERENCE PATH ARROWS -->
  <!-- tempBowl ➔ Mousse -->
  <path d="M 235 205 Q 280 205, 340 180" fill="none" stroke="#38bdf8" stroke-width="2" marker-end="url(#ref-arrow)" />
  <text x="290" y="180" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#38bdf8" font-weight="bold">points to</text>

  <!-- mainCourse ➔ Spaghetti (wait, mainCourse points to null in stack, but let's show an active reference path) -->
  <!-- Let's say there's another active reference, or mainCourse was pointing to Spaghetti before null. For clarity, let's draw another line or show mainCourse pointing to Spaghetti, but let's make stack frame reflect active reference to Spaghetti instead of null, to keep it simple! -->

  <!-- GARBAGE COLLECTOR SWEEPER SYSTEM VISUAL -->
  <g transform="translate(370, 310)">
    <rect width="280" height="35" rx="18" fill="#f43f5e" opacity="0.15" />
    <rect width="280" height="35" rx="18" fill="none" stroke="#f43f5e" stroke-width="1.5" />
    <circle cx="25" cy="17.5" r="8" fill="#f43f5e" />
    <path d="M 22 17.5 L 28 17.5 M 25 14.5 L 25 20.5" stroke="#fff" stroke-width="1.5" />
    <text x="45" y="22" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#fecdd3">GARBAGE COLLECTOR ROBOT PATROL</text>
    <text x="210" y="22" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#fca5a5">Reclaiming unreferenced items...</text>
  </g>
</svg>
