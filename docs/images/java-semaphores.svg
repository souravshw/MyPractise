<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>
  <text x="400" y="50" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">Understanding Java Semaphores</text>
  <text x="400" y="75" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5" text-anchor="middle">Controlling access to resources using permits</text>

  <!-- Permits gatekeeper -->
  <g transform="translate(100, 150)">
    <rect width="180" height="200" rx="6" fill="#140F27" stroke="#3A2075" stroke-width="1.5"/>
    <text x="90" y="35" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#D2C8E3" text-anchor="middle">Semaphore Gate</text>
    
    <circle cx="90" cy="95" r="25" fill="#1F153C" stroke="#00FF87" stroke-width="2"/>
    <text x="90" y="102" font-family="monospace" font-size="20" font-weight="bold" fill="#00FF87" text-anchor="middle">2</text>
    <text x="90" y="150" font-family="'Segoe UI', sans-serif" font-size="11" fill="#887DA5" text-anchor="middle">Permits Available</text>
  </g>

  <!-- Threads waiting -->
  <g transform="translate(340, 170)">
    <!-- Thread Alice -->
    <rect x="0" y="0" width="120" height="40" rx="4" fill="#0C2518" stroke="#00FF87" stroke-width="1"/>
    <text x="60" y="24" font-family="'Segoe UI', sans-serif" font-size="12" fill="#00FF87" text-anchor="middle">Alice (Acquired)</text>
    
    <!-- Thread Bob -->
    <rect x="0" y="55" width="120" height="40" rx="4" fill="#0C2518" stroke="#00FF87" stroke-width="1"/>
    <text x="60" y="79" font-family="'Segoe UI', sans-serif" font-size="12" fill="#00FF87" text-anchor="middle">Bob (Acquired)</text>

    <!-- Thread Charlie -->
    <rect x="0" y="110" width="120" height="40" rx="4" fill="#2D1B1E" stroke="#FF5E5E" stroke-width="1"/>
    <text x="60" y="134" font-family="'Segoe UI', sans-serif" font-size="12" fill="#FF5E5E" text-anchor="middle">Charlie (Blocked)</text>
  </g>

  <!-- ATM Booth representation -->
  <g transform="translate(560, 150)">
    <rect width="180" height="200" rx="8" fill="#1A182E" stroke="#5C42A5" stroke-width="1.5"/>
    <text x="90" y="35" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#E2D6FF" text-anchor="middle">ATM Booth</text>
    
    <rect x="20" y="60" width="140" height="50" rx="4" fill="#140F27" stroke="#5C42A5" stroke-width="1"/>
    <text x="90" y="90" font-family="'Segoe UI', sans-serif" font-size="12" fill="#887DA5" text-anchor="middle">Alice in Slot 1</text>

    <rect x="20" y="125" width="140" height="50" rx="4" fill="#140F27" stroke="#5C42A5" stroke-width="1"/>
    <text x="90" y="155" font-family="'Segoe UI', sans-serif" font-size="12" fill="#887DA5" text-anchor="middle">Bob in Slot 2</text>
  </g>
</svg>
