<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#38bdf8" />
    </marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#fbbf24" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#ef4444" />
    </marker>
  </defs>

  <!-- Background Card -->
  <rect width="800" height="450" rx="16" fill="url(#bg-grad)" />
  <rect width="796" height="446" x="2" y="2" rx="14" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" />

  <!-- Title & Subtitle -->
  <text x="400" y="45" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" letter-spacing="1">
    JVM HEAP DUMP (HPROF) ANATOMY
  </text>
  <text x="400" y="70" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    Visualizing GC Roots, Shallow vs. Retained Size, and Leak Suspects
  </text>

  <!-- Left: GC ROOTS (Active stack references) -->
  <g transform="translate(40, 100)">
    <rect width="180" height="300" rx="10" fill="#1e293b" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1.5" />
    <rect width="180" height="35" rx="10" fill="#334155" />
    <text x="90" y="22" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="bold" fill="#f1f5f9" text-anchor="middle">GC ROOTS (Active Stack)</text>

    <!-- Root Node 1 -->
    <g transform="translate(15, 55)">
      <rect width="150" height="60" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1" />
      <text x="75" y="25" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">Thread Stack Frame</text>
      <text x="75" y="45" font-family="'Courier New', monospace" font-size="10" fill="#cbd5e1" text-anchor="middle">localRef: ActiveSession</text>
    </g>

    <!-- Root Node 2 -->
    <g transform="translate(15, 135)">
      <rect width="150" height="60" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1" />
      <text x="75" y="25" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">System ClassLoader</text>
      <text x="75" y="45" font-family="'Courier New', monospace" font-size="10" fill="#cbd5e1" text-anchor="middle">static: SystemCache</text>
    </g>

    <!-- Explainer note -->
    <text x="90" y="250" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle" font-style="italic">
      GC Roots are entry points.
    </text>
    <text x="90" y="265" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle" font-style="italic">
      Anything linked to them
    </text>
    <text x="90" y="280" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle" font-style="italic">
      cannot be garbage collected.
    </text>
  </g>

  <!-- Right: HEAP OBJECTS TREE -->
  <g transform="translate(260, 100)">
    <rect width="500" height="300" rx="10" fill="#0f172a" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1.5" />
    <rect width="500" height="35" rx="10" fill="#1e1b4b" />
    <text x="250" y="22" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="bold" fill="#c084fc" text-anchor="middle">The Heap (Objects Graph)</text>

    <!-- Normal Reachable Node A (ActiveSession object) -->
    <g id="node-a" transform="translate(30, 60)">
      <rect width="130" height="50" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1.5" filter="url(#glow-blue)" />
      <text x="65" y="20" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">ActiveSession</text>
      <text x="65" y="38" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#a7f3d0" text-anchor="middle">Shallow: 32B | Ret: 1KB</text>
    </g>

    <!-- Normal Reachable Node B (User data) -->
    <g id="node-b" transform="translate(30, 170)">
      <rect width="130" height="50" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1" />
      <text x="65" y="20" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">UserData</text>
      <text x="65" y="38" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#a7f3d0" text-anchor="middle">Shallow: 24B | Ret: 24B</text>
    </g>

    <!-- Leak Suspect Node C (Growing static list/map) -->
    <g id="node-c" transform="translate(230, 100)">
      <rect width="240" height="70" rx="6" fill="#78350f" stroke="#fbbf24" stroke-width="2" filter="url(#glow-gold)" />
      <text x="120" y="22" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">SystemCache (Leak Suspect)</text>
      <text x="120" y="42" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#fde68a" text-anchor="middle">Shallow: 48B | Retained: 240MB</text>
      <text x="120" y="58" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#fbbf24" font-weight="bold" text-anchor="middle">Holds 95% of heap via un-evicted map</text>
    </g>

    <!-- Unreachable Node D (Discarded old object) -->
    <g id="node-d" transform="translate(280, 220)">
      <rect width="140" height="50" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3" filter="url(#glow-red)" />
      <text x="70" y="20" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#fca5a5" text-anchor="middle">OldRequestData</text>
      <text x="70" y="38" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#fca5a5" text-anchor="middle">UNREACHABLE (Dead)</text>
    </g>

    <!-- Relationships Arrows -->
    <!-- ActiveSession -> UserData -->
    <path d="M 95 110 L 95 160" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)" />
    
    <!-- SystemCache -> Map keys/entries (symbolic) -->
    <path d="M 350 170 Q 350 195, 330 210" fill="none" stroke="#ef4444" stroke-dasharray="3,3" stroke-width="1.5" marker-end="url(#arrow-red)" />
  </g>

  <!-- Inter-card connections (GC Roots to Heap Objects) -->
  <!-- Thread Frame -> ActiveSession -->
  <path d="M 220 185 L 280 185" fill="none" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)" />
  <text x="245" y="175" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#38bdf8" text-anchor="middle" font-weight="bold">Root Ref</text>

  <!-- SystemCache static Ref -> SystemCache (Node C) -->
  <path d="M 220 265 Q 280 265, 330 230 Q 370 200, 440 210" fill="none" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-gold)" />
  <text x="260" y="250" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="bold">Static Ref</text>

</svg>
