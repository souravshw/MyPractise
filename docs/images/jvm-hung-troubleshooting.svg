<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <!-- Node Glow Filters -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#38bdf8" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#f43f5e" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="url(#bg-grad)" />
  <rect width="796" height="446" x="2" y="2" rx="14" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" />

  <!-- Title -->
  <text x="400" y="45" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" letter-spacing="1">
    JVM HANG TROUBLESHOOTING PATHWAY
  </text>
  <text x="400" y="70" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    A practical step-by-step diagnostic workflow for production incidents
  </text>

  <!-- Step 1: Is JVM Alive? -->
  <g transform="translate(60, 190)">
    <rect width="160" height="70" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2" filter="url(#glow-blue)" />
    <text x="80" y="25" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="bold" fill="#f8fafc" text-anchor="middle">1. PROCESS CHECK</text>
    <text x="80" y="45" font-family="'Courier New', monospace" font-size="10" fill="#94a3b8" text-anchor="middle">jps -l</text>
    <text x="80" y="58" font-family="'Courier New', monospace" font-size="10" fill="#94a3b8" text-anchor="middle">jcmd &lt;pid&gt; VM.uptime</text>
  </g>

  <!-- Connection Arrow 1 -->
  <path d="M 220 225 L 265 225" fill="none" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)" />
  <text x="242" y="215" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#38bdf8" font-weight="bold" text-anchor="middle">ALIVE</text>

  <!-- Step 2: CPU Check (htop / top) -->
  <g transform="translate(280, 185)">
    <rect width="180" height="80" rx="8" fill="#1e293b" stroke="#f43f5e" stroke-width="2" filter="url(#glow-red)" />
    <text x="90" y="25" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="bold" fill="#f8fafc" text-anchor="middle">2. MONITOR CPU</text>
    <text x="90" y="48" font-family="'Courier New', monospace" font-size="10" fill="#94a3b8" text-anchor="middle">top / htop</text>
    <text x="90" y="65" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#fca5a5" text-anchor="middle">Check system usage</text>
  </g>

  <!-- Branch High CPU (Upward) -->
  <path d="M 370 185 L 370 120 C 370 120, 370 115, 375 115 L 500 115" fill="none" stroke="#fb7185" stroke-width="2" marker-end="url(#arrow-red)" />
  <text x="420" y="105" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#fb7185" font-weight="bold">HIGH CPU (~100%)</text>

  <!-- Branch Normal CPU (Downward) -->
  <path d="M 370 265 L 370 330 C 370 330, 370 335, 375 335 L 500 335" fill="none" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)" />
  <text x="420" y="325" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#38bdf8" font-weight="bold">NORMAL / LOW CPU</text>

  <!-- Panel 3A: High CPU Diagnosis -->
  <g transform="translate(510, 60)">
    <rect width="230" height="110" rx="8" fill="#1e293b" stroke="#fb7185" stroke-width="1.5" />
    <rect width="230" height="25" rx="8" fill="#881337" opacity="0.3" />
    <text x="115" y="17" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#fecdd3" text-anchor="middle">Infinite Loops / GC thrashing</text>
    <text x="15" y="45" font-family="'Courier New', monospace" font-size="10" fill="#94a3b8">top -Hp &lt;pid&gt; (Get TID)</text>
    <text x="15" y="65" font-family="'Courier New', monospace" font-size="10" fill="#94a3b8">printf "%x" &lt;TID&gt; (Get Hex)</text>
    <text x="15" y="85" font-family="'Courier New', monospace" font-size="10" fill="#34d399">Search nid &lt;hex&gt; in jstack</text>
  </g>

  <!-- Panel 3B: Normal CPU Diagnosis -->
  <g transform="translate(510, 280)">
    <rect width="230" height="110" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5" />
    <rect width="230" height="25" rx="8" fill="#1e3a8a" opacity="0.3" />
    <text x="115" y="17" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#bfdbfe" text-anchor="middle">Blocked / Idle Thread Hang</text>
    <text x="15" y="45" font-family="'Courier New', monospace" font-size="10" fill="#94a3b8">jstack &lt;pid&gt; &gt; dump.txt</text>
    <text x="15" y="65" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#fca5a5" font-weight="bold">Check thread states:</text>
    <text x="15" y="85" font-family="'Courier New', monospace" font-size="10" fill="#fb7185">BLOCKED / WAITING / deadlocks</text>
  </g>

  <!-- Heap Dump box -->
  <g transform="translate(280, 310)">
    <!-- Connected to Normal CPU or general checklist -->
    <path d="M 280 225 L 250 225 C 250 225, 240 225, 240 235 L 240 330 C 240 330, 240 340, 250 340 L 280 340" fill="none" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3,3" />
  </g>
  <g transform="translate(60, 315)">
    <rect width="180" height="75" rx="8" fill="#1e293b" stroke="#d97706" stroke-width="1.5" filter="url(#glow-orange)" />
    <text x="90" y="20" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#fcd34d" text-anchor="middle">MEM CHECK (GC &amp; Leak)</text>
    <text x="90" y="40" font-family="'Courier New', monospace" font-size="10" fill="#94a3b8" text-anchor="middle">jstat -gcutil 1000</text>
    <text x="90" y="58" font-family="'Courier New', monospace" font-size="10" fill="#fcd34d" text-anchor="middle">jmap -dump:format=b</text>
  </g>

  <!-- Explanation footer card -->
  <rect x="50" y="405" width="700" height="25" rx="4" fill="rgba(30, 41, 59, 0.9)" />
  <text x="400" y="421" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">
    Always capture thread dumps (`jstack`) and monitor CPU usage threads before restarting the JVM.
  </text>
</svg>
