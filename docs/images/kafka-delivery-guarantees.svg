<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="45" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">
    Kafka Message Delivery Semantics
  </text>

  <!-- 1. At-Most-Once -->
  <g transform="translate(40, 80)">
    <rect width="220" height="320" rx="8" fill="#120D23" stroke="#A83232" stroke-width="1.5"/>
    <text x="110" y="30" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#FFA5A5" text-anchor="middle">At-Most-Once</text>
    <text x="110" y="55" font-family="'Segoe UI', sans-serif" font-size="11" fill="#887DA5" text-anchor="middle">No Retries • Fire &amp; Forget</text>

    <!-- Send arrow -->
    <path d="M40 100 L180 100" stroke="#FF5E5E" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
    <text x="110" y="90" font-family="'Segoe UI', sans-serif" font-size="10" fill="#FFA5A5" text-anchor="middle">Send record</text>
    
    <!-- Broken link representing lost ack -->
    <line x1="180" y1="140" x2="40" y2="140" stroke="#FF5E5E" stroke-width="1.5" stroke-dasharray="3,3"/>
    <circle cx="110" cy="140" r="10" fill="#2E1C22" stroke="#A83232" stroke-width="1"/>
    <text x="110" y="144" font-family="sans-serif" font-size="10" fill="#FF5E5E" text-anchor="middle">X</text>
    <text x="110" y="170" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5" text-anchor="middle">Ack fails (No retry)</text>

    <rect x="20" y="210" width="180" height="50" rx="4" fill="#2E1C22" stroke="#A83232" stroke-width="1"/>
    <text x="110" y="232" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#FFA5A5" text-anchor="middle">Result: Data Loss</text>
    <text x="110" y="248" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5" text-anchor="middle">Record lost forever</text>
  </g>

  <!-- 2. At-Least-Once -->
  <g transform="translate(290, 80)">
    <rect width="220" height="320" rx="8" fill="#120D23" stroke="#FF7A00" stroke-width="1.5"/>
    <text x="110" y="30" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#FF7A00" text-anchor="middle">At-Least-Once</text>
    <text x="110" y="55" font-family="'Segoe UI', sans-serif" font-size="11" fill="#887DA5" text-anchor="middle">Retries active • No deduplication</text>

    <path d="M40 100 L180 100" stroke="#FF7A00" stroke-width="2" fill="none"/>
    <text x="110" y="90" font-family="'Segoe UI', sans-serif" font-size="10" fill="#FF7A00" text-anchor="middle">Send record</text>
    
    <path d="M40 130 L180 130" stroke="#FF7A00" stroke-width="2" fill="none"/>
    <text x="110" y="125" font-family="'Segoe UI', sans-serif" font-size="10" fill="#FF7A00" text-anchor="middle">Retry send (duplicates)</text>

    <rect x="20" y="210" width="180" height="50" rx="4" fill="#2D211A" stroke="#FF7A00" stroke-width="1"/>
    <text x="110" y="232" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#FF7A00" text-anchor="middle">Result: Duplicates</text>
    <text x="110" y="248" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5" text-anchor="middle">Record written twice</text>
  </g>

  <!-- 3. Exactly-Once -->
  <g transform="translate(540, 80)">
    <rect width="220" height="320" rx="8" fill="#120D23" stroke="#00FF87" stroke-width="1.5" filter="url(#glowGreen)"/>
    <text x="110" y="30" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#00FF87" text-anchor="middle">Exactly-Once (EOS)</text>
    <text x="110" y="55" font-family="'Segoe UI', sans-serif" font-size="11" fill="#887DA5" text-anchor="middle">Idempotence + Transactions</text>

    <path d="M40 100 L180 100" stroke="#00FF87" stroke-width="2" fill="none" filter="url(#glowGreen)"/>
    <text x="110" y="90" font-family="'Segoe UI', sans-serif" font-size="10" fill="#C4FFE2" text-anchor="middle">Send record (Seq 1)</text>

    <path d="M40 130 L180 130" stroke="#00FF87" stroke-dasharray="2,2" stroke-width="1.5" fill="none"/>
    <text x="110" y="125" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5" text-anchor="middle">Broker drops duplicates</text>

    <rect x="20" y="210" width="180" height="50" rx="4" fill="#152C22" stroke="#00FF87" stroke-width="1" filter="url(#glowGreen)"/>
    <text x="110" y="232" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#00FF87" text-anchor="middle">Result: Safe Delivery</text>
    <text x="110" y="248" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5" text-anchor="middle">Written exactly once</text>
  </g>
</svg>
