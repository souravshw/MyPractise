<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
    <filter id="glowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="45" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">
    ZooKeeper Metadata Mode vs. Kafka KRaft Mode
  </text>

  <!-- Left: ZooKeeper Mode -->
  <g transform="translate(40, 80)">
    <rect width="330" height="320" rx="10" fill="#120D23" stroke="#FF7A00" stroke-width="1.5" filter="url(#glowOrange)"/>
    <text x="165" y="30" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#FF7A00" text-anchor="middle">Legacy: ZooKeeper Mode</text>
    <text x="165" y="55" font-family="'Segoe UI', sans-serif" font-size="11" fill="#887DA5" text-anchor="middle">Double-cluster administration overhead</text>

    <!-- ZooKeeper Ensembles -->
    <rect x="35" y="80" width="260" height="70" rx="6" fill="#2E1C1A" stroke="#FF7A00" stroke-width="1"/>
    <text x="165" y="105" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#FFA5A5" text-anchor="middle">ZooKeeper Ensemble</text>
    <text x="165" y="125" font-family="monospace" font-size="10" fill="#887DA5" text-anchor="middle">Active Leader + 2 Followers</text>

    <!-- Sync Arrow -->
    <path d="M165 150 L165 190" stroke="#FF7A00" stroke-width="1.5" stroke-dasharray="3,3" fill="none" />

    <!-- Kafka Cluster -->
    <rect x="35" y="190" width="260" height="90" rx="6" fill="#1A182E" stroke="#5C42A5" stroke-width="1"/>
    <text x="165" y="215" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#E2D6FF" text-anchor="middle">Kafka Brokers</text>
    <text x="165" y="240" font-family="monospace" font-size="10" fill="#887DA5" text-anchor="middle">Must sync metadata with ZooKeeper</text>
    <text x="165" y="260" font-family="monospace" font-size="9" fill="#FF5E5E" text-anchor="middle">⚠️ Controller failover: 30+ seconds</text>
  </g>

  <!-- Right: KRaft Mode -->
  <g transform="translate(430, 80)">
    <rect width="330" height="320" rx="10" fill="#120D23" stroke="#00FF87" stroke-width="1.5" filter="url(#glowGreen)"/>
    <text x="165" y="30" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#00FF87" text-anchor="middle">Modern: KRaft Mode</text>
    <text x="165" y="55" font-family="'Segoe UI', sans-serif" font-size="11" fill="#887DA5" text-anchor="middle">Self-managed metadata quorum inside Kafka</text>

    <!-- KRaft Unified Cluster -->
    <rect x="35" y="80" width="260" height="200" rx="8" fill="#152C22" stroke="#00FF87" stroke-width="1"/>
    <text x="165" y="110" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#C4FFE2" text-anchor="middle">Kafka Cluster (Unified)</text>
    
    <!-- Quorum Controller Brokers -->
    <rect x="55" y="130" width="220" height="40" rx="4" fill="#0D2E1C" stroke="#00FF87" stroke-width="1.5" filter="url(#glowGreen)"/>
    <text x="165" y="155" font-family="monospace" font-size="11" font-weight="bold" fill="#00FF87" text-anchor="middle">Active Controllers Quorum</text>
    
    <!-- Regular brokers -->
    <rect x="55" y="180" width="100" height="35" rx="4" fill="#15221F" stroke="#4B8A6A" stroke-width="1"/>
    <text x="105" y="202" font-family="monospace" font-size="10" fill="#E2D6FF" text-anchor="middle">Broker 1</text>

    <rect x="175" y="180" width="100" height="35" rx="4" fill="#15221F" stroke="#4B8A6A" stroke-width="1"/>
    <text x="225" y="202" font-family="monospace" font-size="10" fill="#E2D6FF" text-anchor="middle">Broker 2</text>

    <text x="165" y="255" font-family="monospace" font-size="11" font-weight="bold" fill="#C4FFE2" text-anchor="middle">⚡ Controller failover: milliseconds</text>
  </g>
</svg>
