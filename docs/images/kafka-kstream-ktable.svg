<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="45" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">
    KStream vs. KTable in Kafka Streams
  </text>

  <!-- Left: KStream -->
  <g transform="translate(40, 80)">
    <rect width="330" height="320" rx="10" fill="#120D23" stroke="#00FF87" stroke-width="1.5" filter="url(#glowGreen)"/>
    <text x="165" y="30" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#00FF87" text-anchor="middle">KStream (Event Stream)</text>
    
    <text x="165" y="55" font-family="'Segoe UI', sans-serif" font-size="12" fill="#887DA5" text-anchor="middle">Append Only • Insert Semantics • Log Analogy</text>

    <!-- Records Queue -->
    <g transform="translate(30, 80)">
      <rect x="0" y="0" width="270" height="40" rx="4" fill="#1A2D23" stroke="#00FF87" stroke-width="1"/>
      <text x="135" y="25" font-family="monospace" font-size="12" fill="#C4FFE2" text-anchor="middle">Key: Alice, Val: Buy Latte (t:1)</text>
    </g>
    <g transform="translate(30, 135)">
      <rect x="0" y="0" width="270" height="40" rx="4" fill="#1A2D23" stroke="#00FF87" stroke-width="1"/>
      <text x="135" y="25" font-family="monospace" font-size="12" fill="#C4FFE2" text-anchor="middle">Key: Alice, Val: Buy Cake (t:2)</text>
    </g>
    <g transform="translate(30, 190)">
      <rect x="0" y="0" width="270" height="40" rx="4" fill="#1A2D23" stroke="#00FF87" stroke-width="1"/>
      <text x="135" y="25" font-family="monospace" font-size="12" fill="#C4FFE2" text-anchor="middle">Key: Bob, Val: Buy Tea (t:3)</text>
    </g>

    <text x="165" y="270" font-family="'Segoe UI', sans-serif" font-size="12" fill="#D2C8E3" text-anchor="middle">
      Result: <tspan fill="#00FF87" font-weight="bold">3 separate events</tspan> recorded
    </text>
  </g>

  <!-- Right: KTable -->
  <g transform="translate(430, 80)">
    <rect width="330" height="320" rx="10" fill="#120D23" stroke="#3A86FF" stroke-width="1.5" filter="url(#glowBlue)"/>
    <text x="165" y="30" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#3A86FF" text-anchor="middle">KTable (Changelog Snapshot)</text>
    
    <text x="165" y="55" font-family="'Segoe UI', sans-serif" font-size="12" fill="#887DA5" text-anchor="middle">Key Upserts • Update Semantics • Table Analogy</text>

    <!-- Table representation -->
    <g transform="translate(30, 80)">
      <rect x="0" y="0" width="270" height="150" rx="6" fill="#151A33" stroke="#3A86FF" stroke-width="1"/>
      <!-- Header -->
      <line x1="0" y1="40" x2="270" y2="40" stroke="#3A86FF" stroke-width="1"/>
      <text x="65" y="25" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#7AB1FF">Key</text>
      <text x="185" y="25" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#7AB1FF">Latest Value</text>
      
      <!-- Row 1 -->
      <text x="65" y="75" font-family="monospace" font-size="12" fill="#E2D6FF">Alice</text>
      <text x="185" y="75" font-family="monospace" font-size="12" fill="#FFA5A5">Buy Cake <tspan fill="#887DA5">(t:2)</tspan></text>
      <line x1="10" y1="95" x2="260" y2="95" stroke="#252D5A" stroke-width="0.5"/>

      <!-- Row 2 -->
      <text x="65" y="125" font-family="monospace" font-size="12" fill="#E2D6FF">Bob</text>
      <text x="185" y="125" font-family="monospace" font-size="12" fill="#C4FFE2">Buy Tea <tspan fill="#887DA5">(t:3)</tspan></text>
    </g>

    <text x="165" y="270" font-family="'Segoe UI', sans-serif" font-size="12" fill="#D2C8E3" text-anchor="middle">
      Result: Alice's first order is <tspan fill="#3A86FF" font-weight="bold">overwritten</tspan>
    </text>
  </g>
</svg>
