<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
    <filter id="glowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="45" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">
    Understanding Kafka Log Compaction
  </text>
  <text x="400" y="70" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5" text-anchor="middle">
    Retaining only the latest value for each message key
  </text>

  <!-- Left Side: Before Compaction -->
  <g transform="translate(50, 95)">
    <rect width="320" height="300" rx="10" fill="#120D23" stroke="#FF7A00" stroke-width="1.5" filter="url(#glowOrange)"/>
    <text x="160" y="30" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#FF7A00" text-anchor="middle">Before Compaction (Active Log)</text>

    <!-- Log records timeline -->
    <g transform="translate(20, 60)">
      <!-- Record 1 -->
      <rect x="0" y="0" width="280" height="35" rx="4" fill="#1C1835" stroke="#5C42A5" stroke-width="1"/>
      <text x="140" y="22" font-family="monospace" font-size="11" fill="#E2D6FF" text-anchor="middle">Offset 0 | Key: Alice | Val: V1</text>
      <!-- Line to cross out -->
      <line x1="10" y1="17" x2="270" y2="17" stroke="#FF5E5E" stroke-width="2" stroke-dasharray="2,2"/>
      
      <!-- Record 2 -->
      <rect x="0" y="45" width="280" height="35" rx="4" fill="#1C1835" stroke="#5C42A5" stroke-width="1"/>
      <text x="140" y="67" font-family="monospace" font-size="11" fill="#E2D6FF" text-anchor="middle">Offset 1 | Key: Bob   | Val: V1</text>
      <line x1="10" y1="62" x2="270" y2="62" stroke="#FF5E5E" stroke-width="2" stroke-dasharray="2,2"/>

      <!-- Record 3 -->
      <rect x="0" y="90" width="280" height="35" rx="4" fill="#1C1835" stroke="#5C42A5" stroke-width="1"/>
      <text x="140" y="112" font-family="monospace" font-size="11" fill="#E2D6FF" text-anchor="middle">Offset 2 | Key: Alice | Val: V2</text>

      <!-- Record 4 -->
      <rect x="0" y="135" width="280" height="35" rx="4" fill="#1C1835" stroke="#5C42A5" stroke-width="1"/>
      <text x="140" y="157" font-family="monospace" font-size="11" fill="#E2D6FF" text-anchor="middle">Offset 3 | Key: Charlie | Val: V1</text>
      <line x1="10" y1="152" x2="270" y2="152" stroke="#FF5E5E" stroke-width="2" stroke-dasharray="2,2"/>

      <!-- Record 5 -->
      <rect x="0" y="180" width="280" height="35" rx="4" fill="#1C1835" stroke="#5C42A5" stroke-width="1"/>
      <text x="140" y="202" font-family="monospace" font-size="11" fill="#E2D6FF" text-anchor="middle">Offset 4 | Key: Bob   | Val: V2</text>

      <!-- Record 6 -->
      <rect x="0" y="225" width="280" height="35" rx="4" fill="#1C1835" stroke="#5C42A5" stroke-width="1"/>
      <text x="140" y="247" font-family="monospace" font-size="11" fill="#E2D6FF" text-anchor="middle">Offset 5 | Key: Charlie | Val: V2</text>
    </g>
  </g>

  <!-- Clean Cleaner Arrow -->
  <g transform="translate(380, 210)">
    <path d="M 0,15 L 40,15" stroke="#00FF87" stroke-width="3" fill="none" marker-end="url(#arrow)" filter="url(#glowGreen)"/>
    <text x="20" y="5" font-family="'Segoe UI', sans-serif" font-size="10" fill="#00FF87" text-anchor="middle" font-weight="bold">Log Cleaner</text>
  </g>

  <!-- Right Side: After Compaction -->
  <g transform="translate(430, 95)">
    <rect width="320" height="300" rx="10" fill="#120D23" stroke="#00FF87" stroke-width="1.5" filter="url(#glowGreen)"/>
    <text x="160" y="30" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#00FF87" text-anchor="middle">After Compaction (Compacted Log)</text>

    <g transform="translate(20, 60)">
      <!-- Record 3 (Alice V2) -->
      <rect x="0" y="0" width="280" height="35" rx="4" fill="#152C22" stroke="#00FF87" stroke-width="1"/>
      <text x="140" y="22" font-family="monospace" font-size="11" fill="#C4FFE2" text-anchor="middle">Offset 2 | Key: Alice | Val: V2</text>

      <!-- Record 5 (Bob V2) -->
      <rect x="0" y="50" width="280" height="35" rx="4" fill="#152C22" stroke="#00FF87" stroke-width="1"/>
      <text x="140" y="72" font-family="monospace" font-size="11" fill="#C4FFE2" text-anchor="middle">Offset 4 | Key: Bob   | Val: V2</text>

      <!-- Record 6 (Charlie V2) -->
      <rect x="0" y="100" width="280" height="35" rx="4" fill="#152C22" stroke="#00FF87" stroke-width="1"/>
      <text x="140" y="122" font-family="monospace" font-size="11" fill="#C4FFE2" text-anchor="middle">Offset 5 | Key: Charlie | Val: V2</text>
      
      <!-- Blank Spacers to show compaction -->
      <rect x="0" y="150" width="280" height="90" rx="4" fill="#151221" stroke="#3A2075" stroke-width="1" stroke-dasharray="4"/>
      <text x="140" y="200" font-family="'Segoe UI', sans-serif" font-size="12" fill="#887DA5" text-anchor="middle">Stale duplicates discarded. Disk space reclaimed.</text>
    </g>
  </g>
</svg>
