<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="45" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">
    Important Kafka Monitoring Metrics
  </text>
  <text x="400" y="70" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5" text-anchor="middle">
    Key health metrics to track in production dashboards
  </text>

  <!-- Left: Broker Metrics -->
  <g transform="translate(60, 100)">
    <rect width="320" height="290" rx="10" fill="#120D23" stroke="#00FF87" stroke-width="1.5" filter="url(#glowGreen)"/>
    <text x="160" y="30" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#00FF87" text-anchor="middle">Broker Metrics</text>

    <!-- UnderReplicatedPartitions -->
    <g transform="translate(20, 60)">
      <rect width="280" height="60" rx="6" fill="#152C22" stroke="#00FF87" stroke-width="1" />
      <text x="15" y="25" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#C4FFE2">UnderReplicatedPartitions</text>
      <text x="15" y="45" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5">Partitions missing copies. Must be 0</text>
      <rect x="235" y="15" width="30" height="30" rx="4" fill="#0D2E16" stroke="#00FF87" stroke-width="1.5" />
      <text x="250" y="35" font-family="monospace" font-size="16" font-weight="bold" fill="#00FF87" text-anchor="middle">0</text>
    </g>

    <!-- ActiveControllerCount -->
    <g transform="translate(20, 135)">
      <rect width="280" height="60" rx="6" fill="#152C22" stroke="#00FF87" stroke-width="1" />
      <text x="15" y="25" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#C4FFE2">ActiveControllerCount</text>
      <text x="15" y="45" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5">Active group manager. Must be exactly 1</text>
      <rect x="235" y="15" width="30" height="30" rx="4" fill="#0D2E16" stroke="#00FF87" stroke-width="1.5" />
      <text x="250" y="35" font-family="monospace" font-size="16" font-weight="bold" fill="#00FF87" text-anchor="middle">1</text>
    </g>

    <!-- MessagesInPerSec -->
    <g transform="translate(20, 210)">
      <rect width="280" height="60" rx="6" fill="#1C1835" stroke="#5C42A5" stroke-width="1" />
      <text x="15" y="25" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#E2D6FF">MessagesInPerSec</text>
      <text x="15" y="45" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5">Rate of message ingestion per second</text>
    </g>
  </g>

  <!-- Right: Client Metrics -->
  <g transform="translate(420, 100)">
    <rect width="320" height="290" rx="10" fill="#120D23" stroke="#FF7A00" stroke-width="1.5" filter="url(#glowOrange)"/>
    <text x="160" y="30" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#FF7A00" text-anchor="middle">Client Metrics</text>

    <!-- Consumer Lag -->
    <g transform="translate(20, 60)">
      <rect width="280" height="85" rx="6" fill="#2D211A" stroke="#FF7A00" stroke-width="1" />
      <text x="15" y="25" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#FFA5A5">records-lag-max</text>
      <text x="15" y="45" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5">Max reading backlog. Alert when</text>
      <text x="15" y="60" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5">backlog spikes upward.</text>
      
      <!-- Graph visual -->
      <path d="M 200,60 L 220,55 L 240,35 L 260,25" fill="none" stroke="#FF5E5E" stroke-width="2" marker-end="url(#arrow)"/>
    </g>

    <!-- Producer metrics -->
    <g transform="translate(20, 160)">
      <rect width="280" height="60" rx="6" fill="#1C1835" stroke="#5C42A5" stroke-width="1" />
      <text x="15" y="25" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#E2D6FF">record-send-rate</text>
      <text x="15" y="45" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5">Producer traffic output scale rate</text>
    </g>

    <!-- Producer errors -->
    <g transform="translate(20, 230)">
      <rect width="280" height="45" rx="6" fill="#152C22" stroke="#00FF87" stroke-width="1" />
      <text x="15" y="20" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#C4FFE2">record-error-rate</text>
      <text x="15" y="35" font-family="'Segoe UI', sans-serif" font-size="9" fill="#887DA5">Must be 0 (failures due to network/schema)</text>
    </g>
  </g>
</svg>
