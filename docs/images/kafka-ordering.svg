<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="45" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">
    Kafka Message Ordering Across Partitions
  </text>
  <text x="400" y="70" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5" text-anchor="middle">
    Kafka guarantees strict message ordering only within a single partition
  </text>

  <!-- Producer -->
  <g transform="translate(60, 150)">
    <rect width="180" height="150" rx="8" fill="#120D23" stroke="#00FF87" stroke-width="1.5" filter="url(#glowGreen)"/>
    <text x="90" y="30" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#00FF87" text-anchor="middle">Key-Based Producer</text>
    <text x="90" y="60" font-family="monospace" font-size="11" fill="#887DA5" text-anchor="middle">Key: Cust_A -> Msg 1</text>
    <text x="90" y="80" font-family="monospace" font-size="11" fill="#887DA5" text-anchor="middle">Key: Cust_A -> Msg 2</text>
    <text x="90" y="100" font-family="monospace" font-size="11" fill="#887DA5" text-anchor="middle">Key: Cust_B -> Msg 1</text>
  </g>

  <!-- Partitions -->
  <g transform="translate(320, 120)">
    <rect width="180" height="190" rx="10" fill="#151A33" stroke="#3A86FF" stroke-width="1.5" filter="url(#glowBlue)"/>
    <text x="90" y="25" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#7AB1FF" text-anchor="middle">Topic Partitions</text>
    
    <!-- Partition 0 -->
    <rect x="15" y="45" width="150" height="40" rx="4" fill="#1C1835" stroke="#3A86FF" stroke-width="1"/>
    <text x="25" y="68" font-family="monospace" font-size="11" fill="#E2D6FF">P0:</text>
    <!-- Cust A messages sit sequentially in P0 -->
    <rect x="55" y="52" width="40" height="25" rx="2" fill="#0E2E1B" stroke="#00FF87" stroke-width="1"/>
    <text x="75" y="68" font-family="monospace" font-size="9" fill="#00FF87" text-anchor="middle">A:1</text>
    <rect x="105" y="52" width="40" height="25" rx="2" fill="#0E2E1B" stroke="#00FF87" stroke-width="1"/>
    <text x="125" y="68" font-family="monospace" font-size="9" fill="#00FF87" text-anchor="middle">A:2</text>

    <!-- Partition 1 -->
    <rect x="15" y="105" width="150" height="40" rx="4" fill="#1C1835" stroke="#3A86FF" stroke-width="1"/>
    <text x="25" y="128" font-family="monospace" font-size="11" fill="#E2D6FF">P1:</text>
    <rect x="55" y="112" width="40" height="25" rx="2" fill="#2E2015" stroke="#FF7A00" stroke-width="1"/>
    <text x="75" y="128" font-family="monospace" font-size="9" fill="#FF7A00" text-anchor="middle">B:1</text>
  </g>

  <!-- Connectors -->
  <path d="M240 190 L300 165" stroke="#00FF87" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <path d="M240 230 L300 240" stroke="#FF7A00" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- Consumer -->
  <g transform="translate(560, 150)">
    <rect width="180" height="150" rx="8" fill="#120D23" stroke="#00FF87" stroke-width="1.5" filter="url(#glowGreen)"/>
    <text x="90" y="30" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#00FF87" text-anchor="middle">Single Consumer</text>
    <text x="90" y="60" font-family="monospace" font-size="11" fill="#887DA5" text-anchor="middle">Reads P0: A:1 → A:2</text>
    <text x="90" y="90" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#00FF87" text-anchor="middle">Ordering Preserved!</text>
  </g>
  <path d="M500 165 L550 190" stroke="#00FF87" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
</svg>
