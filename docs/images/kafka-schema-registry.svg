<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="45" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">
    Kafka Schema Registry Architecture
  </text>
  <text x="400" y="70" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5" text-anchor="middle">
    Centralized schema validation and metadata registry
  </text>

  <!-- Producer Card -->
  <g transform="translate(50, 210)">
    <rect width="160" height="120" rx="8" fill="#120D23" stroke="#00FF87" stroke-width="1.5" filter="url(#glowGreen)"/>
    <text x="80" y="45" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#00FF87" text-anchor="middle">Producer Client</text>
    <text x="80" y="75" font-family="monospace" font-size="11" fill="#887DA5" text-anchor="middle">Avro Serializer</text>
  </g>

  <!-- Kafka Broker / Topic -->
  <g transform="translate(320, 210)">
    <rect width="160" height="120" rx="8" fill="#151A33" stroke="#3A86FF" stroke-width="1.5" filter="url(#glowBlue)"/>
    <text x="80" y="45" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#7AB1FF" text-anchor="middle">Kafka Broker</text>
    <text x="80" y="75" font-family="monospace" font-size="11" fill="#887BA2" text-anchor="middle">Payload with Schema ID</text>
    <!-- Arrow from Producer to Broker -->
    <path d="M-100 60 L-10 60" stroke="#00FF87" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  </g>

  <!-- Consumer Card -->
  <g transform="translate(590, 210)">
    <rect width="160" height="120" rx="8" fill="#120D23" stroke="#00FF87" stroke-width="1.5" filter="url(#glowGreen)"/>
    <text x="80" y="45" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#00FF87" text-anchor="middle">Consumer Client</text>
    <text x="80" y="75" font-family="monospace" font-size="11" fill="#887DA5" text-anchor="middle">Avro Deserializer</text>
    <!-- Arrow from Broker to Consumer -->
    <path d="M-100 60 L-10 60" stroke="#3A86FF" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  </g>

  <!-- Schema Registry (Centralized Hub) -->
  <g transform="translate(300, 100)">
    <rect width="200" height="60" rx="8" fill="#110722" stroke="#5C42A5" stroke-width="1.5" />
    <text x="100" y="35" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#E2D6FF" text-anchor="middle">Schema Registry</text>
  </g>

  <!-- Dotted path arrows connecting clients to Schema Registry -->
  <path d="M130 210 L130 130 L300 130" stroke="#00FF87" stroke-dasharray="3,3" stroke-width="1.5" fill="none"/>
  <text x="215" y="120" font-family="'Segoe UI', sans-serif" font-size="10" fill="#00FF87" text-anchor="middle">1. Register Schema</text>

  <path d="M670 210 L670 130 L500 130" stroke="#3A86FF" stroke-dasharray="3,3" stroke-width="1.5" fill="none"/>
  <text x="585" y="120" font-family="'Segoe UI', sans-serif" font-size="10" fill="#7AB1FF" text-anchor="middle">2. Retrieve Schema</text>
</svg>
