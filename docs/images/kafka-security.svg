<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="45" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">
    Apache Kafka Security Model
  </text>
  <text x="400" y="70" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5" text-anchor="middle">
    Authentication, Encryption, and Authorization Mechanisms
  </text>

  <!-- 1. Encryption in Transit -->
  <g transform="translate(60, 110)">
    <rect width="200" height="260" rx="10" fill="#120D23" stroke="#3A86FF" stroke-width="1.5" filter="url(#glowBlue)"/>
    <text x="100" y="30" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#7AB1FF" text-anchor="middle">1. Encryption</text>
    
    <!-- Lock Icon -->
    <rect x="75" y="80" width="50" height="40" rx="4" fill="#1B1530" stroke="#3A86FF" stroke-width="2"/>
    <path d="M85 80 V65 C85 50, 115 50, 115 65 V80" fill="none" stroke="#3A86FF" stroke-width="2"/>

    <text x="100" y="170" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#E2D6FF" text-anchor="middle">SSL / TLS</text>
    <text x="100" y="200" font-family="'Segoe UI', sans-serif" font-size="11" fill="#887BA2" text-anchor="middle">Encrypts all traffic</text>
    <text x="100" y="220" font-family="'Segoe UI', sans-serif" font-size="11" fill="#887BA2" text-anchor="middle">between Client &amp; Broker</text>
  </g>

  <!-- 2. Authentication -->
  <g transform="translate(300, 110)">
    <rect width="200" height="260" rx="10" fill="#120D23" stroke="#00FF87" stroke-width="1.5" filter="url(#glowGreen)"/>
    <text x="100" y="30" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#00FF87" text-anchor="middle">2. Authentication</text>
    
    <!-- ID badge Icon -->
    <rect x="70" y="70" width="60" height="60" rx="6" fill="#152C22" stroke="#00FF87" stroke-width="2"/>
    <circle cx="100" cy="95" r="10" fill="none" stroke="#00FF87" stroke-width="2"/>
    <path d="M85 120 C85 110, 115 110, 115 120" fill="none" stroke="#00FF87" stroke-width="2"/>

    <text x="100" y="170" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#C4FFE2" text-anchor="middle">SASL / mTLS</text>
    <text x="100" y="200" font-family="'Segoe UI', sans-serif" font-size="11" fill="#887BA2" text-anchor="middle">Verifies client identity</text>
    <text x="100" y="220" font-family="'Segoe UI', sans-serif" font-size="11" fill="#887BA2" text-anchor="middle">using SCRAM or Kerberos</text>
  </g>

  <!-- 3. Authorization -->
  <g transform="translate(540, 110)">
    <rect width="200" height="260" rx="10" fill="#120D23" stroke="#5C42A5" stroke-width="1.5"/>
    <text x="100" y="30" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#E2D6FF" text-anchor="middle">3. Authorization</text>
    
    <!-- Shield Icon -->
    <path d="M100 60 L140 75 V110 C140 135, 100 150, 100 150 C100 150, 60 135, 60 110 V75 Z" fill="#1B1530" stroke="#5C42A5" stroke-width="2"/>

    <text x="100" y="170" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#E2D6FF" text-anchor="middle">ACLs</text>
    <text x="100" y="200" font-family="'Segoe UI', sans-serif" font-size="11" fill="#887BA2" text-anchor="middle">Restricts read/write access</text>
    <text x="100" y="220" font-family="'Segoe UI', sans-serif" font-size="11" fill="#887BA2" text-anchor="middle">to specific topics &amp; groups</text>
  </g>
</svg>
