<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="glowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="45" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">
    State Store Architecture in Kafka Streams
  </text>
  <text x="400" y="70" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5" text-anchor="middle">
    RocksDB Local Memory backed up by remote Changelog Topics
  </text>

  <!-- Stream Task Box -->
  <g transform="translate(60, 110)">
    <rect width="360" height="280" rx="12" fill="#120D23" stroke="#3A86FF" stroke-width="2" filter="url(#glowBlue)"/>
    <text x="180" y="30" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#3A86FF" text-anchor="middle">Kafka Streams Task (JVM Container)</text>
    
    <!-- Processor Logic -->
    <rect x="30" y="60" width="300" height="60" rx="6" fill="#1F173C" stroke="#5C42A5" stroke-width="1"/>
    <text x="180" y="85" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#C4FFE2" text-anchor="middle">Stream Processing Logic</text>
    <text x="180" y="103" font-family="monospace" font-size="11" fill="#887DA5" text-anchor="middle">KStream.groupByKey().count()</text>

    <!-- Arrow down to RocksDB -->
    <path d="M180 120 L180 160" stroke="#3A86FF" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
    <text x="195" y="145" font-family="'Segoe UI', sans-serif" font-size="11" fill="#3A86FF" font-weight="bold">Query / Write</text>

    <!-- RocksDB Card -->
    <rect x="30" y="160" width="300" height="90" rx="8" fill="#2D1A14" stroke="#FF7A00" stroke-width="1.5" filter="url(#glowOrange)"/>
    <text x="180" y="185" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#FF7A00" text-anchor="middle">RocksDB (Local State Store)</text>
    <text x="180" y="210" font-family="monospace" font-size="12" fill="#FFA5A5" text-anchor="middle">Alice = 24 purchases</text>
    <text x="180" y="230" font-family="monospace" font-size="12" fill="#FFA5A5" text-anchor="middle">Bob = 12 purchases</text>
  </g>

  <!-- Connection to Kafka Broker -->
  <path d="M420 265 L520 265" stroke="#FF7A00" stroke-width="2" stroke-dasharray="4,4" fill="none"/>
  <text x="470" y="255" font-family="'Segoe UI', sans-serif" font-size="11" fill="#FF7A00" text-anchor="middle" font-weight="bold">Sync Backup</text>

  <!-- Kafka Broker Box -->
  <g transform="translate(540, 110)">
    <rect width="200" height="280" rx="12" fill="#140F27" stroke="#3A2075" stroke-width="1.5"/>
    <text x="100" y="30" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#D2C8E3" text-anchor="middle">Kafka Broker</text>
    
    <!-- Topic Card -->
    <rect x="20" y="90" width="160" height="150" rx="8" fill="#1C1835" stroke="#5C42A5" stroke-width="1"/>
    <text x="100" y="120" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#E2D6FF" text-anchor="middle">Changelog Topic</text>
    <text x="100" y="145" font-family="monospace" font-size="10" fill="#887DA5" text-anchor="middle">compact cleanup policy</text>
    
    <!-- Log Partition line representation -->
    <rect x="30" y="170" width="140" height="15" rx="2" fill="#110722" stroke="#3A2075" stroke-width="1"/>
    <circle cx="50" cy="177" r="4" fill="#FF7A00"/>
    <circle cx="90" cy="177" r="4" fill="#FF7A00"/>
    <circle cx="130" cy="177" r="4" fill="#FF7A00"/>

    <text x="100" y="220" font-family="'Segoe UI', sans-serif" font-size="11" fill="#00FF87" text-anchor="middle">Restores store on crash</text>
  </g>
</svg>
