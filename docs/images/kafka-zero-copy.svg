<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="45" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">
    Standard Data Transfer vs. Kafka Zero-Copy
  </text>

  <!-- Left Side: Traditional Approach -->
  <g transform="translate(40, 75)">
    <!-- Container -->
    <rect width="330" height="330" rx="10" fill="#120D23" stroke="#C82828" stroke-width="1.5" stroke-dasharray="4" opacity="0.85"/>
    <text x="165" y="30" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#FF5E5E" text-anchor="middle">Traditional Approach (4 Copies)</text>
    
    <!-- Layers -->
    <rect x="30" y="60" width="270" height="35" rx="5" fill="#1C1835" stroke="#4B3B8A" stroke-width="1" />
    <text x="165" y="82" font-family="monospace" font-size="12" fill="#E2D6FF" text-anchor="middle">1. Disk (File System)</text>

    <!-- Down arrow -->
    <path d="M165 95 L165 115" stroke="#FF5E5E" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

    <rect x="30" y="120" width="270" height="35" rx="5" fill="#1C1835" stroke="#4B3B8A" stroke-width="1" />
    <text x="165" y="142" font-family="monospace" font-size="12" fill="#E2D6FF" text-anchor="middle">2. OS Kernel Page Cache</text>

    <!-- Up/down arrow to User space -->
    <path d="M165 155 L165 175" stroke="#FF5E5E" stroke-width="1.5" fill="none"/>

    <rect x="30" y="180" width="270" height="35" rx="5" fill="#2E1C22" stroke="#A83232" stroke-width="1" />
    <text x="165" y="202" font-family="monospace" font-size="12" fill="#FFA5A5" text-anchor="middle">3. JVM User Space (App Buffer)</text>

    <!-- Down arrow to Socket buffer -->
    <path d="M165 215 L165 235" stroke="#FF5E5E" stroke-width="1.5" fill="none"/>

    <rect x="30" y="240" width="270" height="35" rx="5" fill="#1C1835" stroke="#4B3B8A" stroke-width="1" />
    <text x="165" y="262" font-family="monospace" font-size="12" fill="#E2D6FF" text-anchor="middle">4. OS Socket Buffer</text>

    <!-- Down arrow -->
    <path d="M165 275 L165 295" stroke="#FF5E5E" stroke-width="1.5" fill="none"/>

    <rect x="30" y="300" width="270" height="20" rx="4" fill="#0D2D1B" stroke="#00FF87" stroke-width="1" />
    <text x="165" y="315" font-family="monospace" font-size="11" fill="#00FF87" text-anchor="middle">5. Network Interface Card (NIC)</text>
    
    <text x="165" y="350" font-family="'Segoe UI', sans-serif" font-size="11" fill="#887DA5" text-anchor="middle">4 Context Switches (Kernel ↔ User)</text>
  </g>

  <!-- Right Side: Zero-Copy Approach -->
  <g transform="translate(430, 75)">
    <!-- Container -->
    <rect width="330" height="330" rx="10" fill="#120D23" stroke="#00FF87" stroke-width="1.5" filter="url(#glowGreen)"/>
    <text x="165" y="30" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#00FF87" text-anchor="middle">Kafka Zero-Copy (Direct Transfer)</text>

    <!-- Layers -->
    <rect x="30" y="60" width="270" height="35" rx="5" fill="#1C1835" stroke="#4B3B8A" stroke-width="1" />
    <text x="165" y="82" font-family="monospace" font-size="12" fill="#E2D6FF" text-anchor="middle">1. Disk (File System)</text>

    <rect x="30" y="120" width="270" height="35" rx="5" fill="#152C27" stroke="#00FF87" stroke-width="1" />
    <text x="165" y="142" font-family="monospace" font-size="12" fill="#C4FFE2" text-anchor="middle">2. OS Kernel Page Cache</text>

    <!-- Glowing Direct Transfer Line -->
    <path d="M165 155 L165 295" stroke="#00FF87" stroke-width="3.5" filter="url(#glowGreen)" stroke-dasharray="5,5" fill="none"/>
    <rect x="110" y="200" width="110" height="40" rx="6" fill="#0D2E16" stroke="#00FF87" stroke-width="1.5" />
    <text x="165" y="218" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#00FF87" text-anchor="middle">sendfile()</text>
    <text x="165" y="232" font-family="'Segoe UI', sans-serif" font-size="9" fill="#00FF87" text-anchor="middle">Bypasses CPU Memory</text>

    <rect x="30" y="300" width="270" height="20" rx="4" fill="#0D2D1B" stroke="#00FF87" stroke-width="1" />
    <text x="165" y="315" font-family="monospace" font-size="11" fill="#00FF87" text-anchor="middle">3. Network Interface Card (NIC)</text>
    
    <text x="165" y="350" font-family="'Segoe UI', sans-serif" font-size="11" fill="#887DA5" text-anchor="middle">2 Context Switches (No User Space copy)</text>
  </g>
</svg>
