<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="45" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">
    Configuring Zero Data Loss in Kafka
  </text>
  <text x="400" y="70" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5" text-anchor="middle">
    Production checklist for absolute data durability
  </text>

  <!-- 1. Producer settings -->
  <g transform="translate(40, 110)">
    <rect width="210" height="260" rx="8" fill="#120D23" stroke="#00FF87" stroke-width="1.5" filter="url(#glowGreen)"/>
    <text x="105" y="30" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#00FF87" text-anchor="middle">1. Producer Configs</text>
    <text x="20" y="70" font-family="monospace" font-size="11" fill="#E2D6FF">acks = all</text>
    <text x="20" y="90" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5">Wait for all replicas to write</text>
    <text x="20" y="130" font-family="monospace" font-size="11" fill="#E2D6FF">enable.idempotence = true</text>
    <text x="20" y="150" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5">Prevent duplicate retry records</text>
    <text x="20" y="190" font-family="monospace" font-size="11" fill="#E2D6FF">retries = MAX_INT</text>
    <text x="20" y="210" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5">Keep trying on transient drops</text>
  </g>

  <!-- 2. Broker settings -->
  <g transform="translate(295, 110)">
    <rect width="210" height="260" rx="8" fill="#120D23" stroke="#00FF87" stroke-width="1.5" filter="url(#glowGreen)"/>
    <text x="105" y="30" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#00FF87" text-anchor="middle">2. Broker / Topic Configs</text>
    <text x="20" y="70" font-family="monospace" font-size="11" fill="#E2D6FF">replication.factor &gt;= 3</text>
    <text x="20" y="90" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5">Keep at least 3 partition copies</text>
    <text x="20" y="130" font-family="monospace" font-size="11" fill="#E2D6FF">min.insync.replicas = 2</text>
    <text x="20" y="150" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5">Minimum ISR needed for writes</text>
    <text x="20" y="190" font-family="monospace" font-size="11" fill="#E2D6FF">unclean.leader.election = false</text>
    <text x="20" y="210" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5">Block writes if no ISR is online</text>
  </g>

  <!-- 3. Consumer settings -->
  <g transform="translate(550, 110)">
    <rect width="210" height="260" rx="8" fill="#120D23" stroke="#00FF87" stroke-width="1.5" filter="url(#glowGreen)"/>
    <text x="105" y="30" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#00FF87" text-anchor="middle">3. Consumer Configs</text>
    <text x="20" y="70" font-family="monospace" font-size="11" fill="#E2D6FF">enable.auto.commit = false</text>
    <text x="20" y="90" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5">Disable background commits</text>
    <text x="20" y="140" font-family="monospace" font-size="11" fill="#E2D6FF">Process-then-Commit</text>
    <text x="20" y="160" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5">Only commit offsets manually</text>
    <text x="20" y="175" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5">after business processing finishes</text>
    <text x="20" y="190" font-family="'Segoe UI', sans-serif" font-size="10" fill="#887DA5">successfully.</text>
  </g>
</svg>
