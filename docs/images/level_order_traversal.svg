<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="100%" height="100%">
  <!-- Background Slate -->
  <rect width="100%" height="100%" rx="16" fill="#1e293b"/>
  <!-- Grid overlay -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>

  <text x="250" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="16" fill="#f8fafc" text-anchor="middle">Binary Tree Level Order Traversal (BFS)</text>

  <!-- Level 0 Guide -->
  <line x1="40" y1="70" x2="320" y2="70" stroke="rgba(255,255,255,0.05)" stroke-width="2" stroke-dasharray="2 2"/>
  <text x="340" y="74" font-family="sans-serif" font-size="11" fill="#f43f5e" font-weight="bold">Level 0 → [3]</text>

  <!-- Level 1 Guide -->
  <line x1="40" y1="130" x2="320" y2="130" stroke="rgba(255,255,255,0.05)" stroke-width="2" stroke-dasharray="2 2"/>
  <text x="340" y="134" font-family="sans-serif" font-size="11" fill="#3b82f6" font-weight="bold">Level 1 → [9, 20]</text>

  <!-- Level 2 Guide -->
  <line x1="40" y1="190" x2="320" y2="190" stroke="rgba(255,255,255,0.05)" stroke-width="2" stroke-dasharray="2 2"/>
  <text x="340" y="194" font-family="sans-serif" font-size="11" fill="#10b981" font-weight="bold">Level 2 → [15, 7]</text>

  <!-- Tree Structure -->
  <g transform="translate(40, 40)">
    <!-- Connections -->
    <line x1="140" y1="30" x2="90" y2="90" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <line x1="140" y1="30" x2="190" y2="90" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <line x1="190" y1="90" x2="150" y2="150" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <line x1="190" y1="90" x2="230" y2="150" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

    <!-- Root: 3 -->
    <circle cx="140" cy="30" r="16" fill="#1e293b" stroke="#f43f5e" stroke-width="2.5"/>
    <text x="140" y="35" font-family="monospace" font-weight="bold" font-size="13" fill="#f8fafc" text-anchor="middle">3</text>

    <!-- Left: 9 -->
    <circle cx="90" cy="90" r="16" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="90" y="95" font-family="monospace" font-weight="bold" font-size="13" fill="#f8fafc" text-anchor="middle">9</text>

    <!-- Right: 20 -->
    <circle cx="190" cy="90" r="16" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="190" y="95" font-family="monospace" font-weight="bold" font-size="13" fill="#f8fafc" text-anchor="middle">20</text>

    <!-- Left child of 20: 15 -->
    <circle cx="150" cy="150" r="16" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="150" y="155" font-family="monospace" font-weight="bold" font-size="13" fill="#f8fafc" text-anchor="middle">15</text>

    <!-- Right child of 20: 7 -->
    <circle cx="230" cy="150" r="16" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="230" y="155" font-family="monospace" font-weight="bold" font-size="13" fill="#f8fafc" text-anchor="middle">7</text>
  </g>

  <!-- BFS Queue State Visualization -->
  <g transform="translate(60, 240)">
    <text x="0" y="-12" font-family="sans-serif" font-weight="bold" font-size="12" fill="#94a3b8">FIFO Queue Processing (Level order):</text>
    
    <!-- Queue container -->
    <rect x="0" y="0" width="220" height="40" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
    
    <!-- Elements in Queue -->
    <g font-family="monospace" font-weight="bold" font-size="14" fill="#f8fafc">
      <!-- 15 -->
      <rect x="15" y="5" width="40" height="30" rx="4" fill="#10b981"/>
      <text x="35" y="25" text-anchor="middle">15</text>

      <!-- 7 -->
      <rect x="65" y="5" width="40" height="30" rx="4" fill="#10b981"/>
      <text x="85" y="25" text-anchor="middle">7</text>

      <text x="140" y="25" fill="#64748b" font-size="11">... processed 9, 20</text>
    </g>
    
    <text x="-15" y="25" font-family="sans-serif" font-size="10" fill="#10b981" text-anchor="middle" font-weight="bold">IN</text>
    <text x="235" y="25" font-family="sans-serif" font-size="10" fill="#10b981" text-anchor="middle" font-weight="bold">OUT</text>
  </g>

  <!-- Explanation footer -->
  <g transform="translate(40, 310)" font-family="sans-serif" font-size="12" fill="#94a3b8">
    <text x="210" y="0" text-anchor="middle">Use a Queue to track nodes, scanning level-by-level from left to right.</text>
  </g>
</svg>
