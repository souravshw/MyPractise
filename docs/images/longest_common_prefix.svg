<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="100%" height="100%">
  <!-- Background Slate -->
  <rect width="100%" height="100%" rx="16" fill="#1e293b"/>
  <!-- Grid overlay -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>

  <text x="250" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="16" fill="#f8fafc" text-anchor="middle">Longest Common Prefix: ["flower", "flow", "flight"]</text>

  <!-- Comparison Matrix -->
  <g transform="translate(60, 60)" font-family="monospace" font-weight="bold" font-size="16" fill="#f8fafc">
    
    <!-- Row 0: flower -->
    <g transform="translate(0, 0)">
      <text x="-15" y="25" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="end">str[0]</text>
      <rect x="0" y="0" width="35" height="35" rx="4" fill="#10b981"/>
      <text x="17.5" y="22" text-anchor="middle">f</text>

      <rect x="40" y="0" width="35" height="35" rx="4" fill="#10b981"/>
      <text x="17.5" y="22" transform="translate(40, 0)" text-anchor="middle">l</text>

      <rect x="80" y="0" width="35" height="35" rx="4" fill="#ef4444"/>
      <text x="17.5" y="22" transform="translate(80, 0)" text-anchor="middle">o</text>

      <rect x="120" y="0" width="35" height="35" rx="4" fill="#334155"/>
      <text x="17.5" y="22" transform="translate(120, 0)" text-anchor="middle">w</text>

      <rect x="160" y="0" width="35" height="35" rx="4" fill="#334155"/>
      <text x="17.5" y="22" transform="translate(160, 0)" text-anchor="middle">e</text>

      <rect x="200" y="0" width="35" height="35" rx="4" fill="#334155"/>
      <text x="17.5" y="22" transform="translate(200, 0)" text-anchor="middle">r</text>
    </g>

    <!-- Row 1: flow -->
    <g transform="translate(0, 45)">
      <text x="-15" y="25" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="end">str[1]</text>
      <rect x="0" y="0" width="35" height="35" rx="4" fill="#10b981"/>
      <text x="17.5" y="22" text-anchor="middle">f</text>

      <rect x="40" y="0" width="35" height="35" rx="4" fill="#10b981"/>
      <text x="17.5" y="22" transform="translate(40, 0)" text-anchor="middle">l</text>

      <rect x="80" y="0" width="35" height="35" rx="4" fill="#ef4444"/>
      <text x="17.5" y="22" transform="translate(80, 0)" text-anchor="middle">o</text>

      <rect x="120" y="0" width="35" height="35" rx="4" fill="#334155"/>
      <text x="17.5" y="22" transform="translate(120, 0)" text-anchor="middle">w</text>
    </g>

    <!-- Row 2: flight -->
    <g transform="translate(0, 90)">
      <text x="-15" y="25" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="end">str[2]</text>
      <rect x="0" y="0" width="35" height="35" rx="4" fill="#10b981"/>
      <text x="17.5" y="22" text-anchor="middle">f</text>

      <rect x="40" y="0" width="35" height="35" rx="4" fill="#10b981"/>
      <text x="17.5" y="22" transform="translate(40, 0)" text-anchor="middle">l</text>

      <rect x="80" y="0" width="35" height="35" rx="4" fill="#ef4444"/>
      <text x="17.5" y="22" transform="translate(80, 0)" text-anchor="middle">i</text>

      <rect x="120" y="0" width="35" height="35" rx="4" fill="#334155"/>
      <text x="17.5" y="22" transform="translate(120, 0)" text-anchor="middle">g</text>

      <rect x="160" y="0" width="35" height="35" rx="4" fill="#334155"/>
      <text x="17.5" y="22" transform="translate(160, 0)" text-anchor="middle">h</text>

      <rect x="200" y="0" width="35" height="35" rx="4" fill="#334155"/>
      <text x="17.5" y="22" transform="translate(200, 0)" text-anchor="middle">t</text>
    </g>

    <!-- Common Prefix Boundary -->
    <line x1="77" y1="-10" x2="77" y2="135" stroke="#10b981" stroke-width="2.5" stroke-dasharray="3 3"/>
    <text x="38" y="152" font-family="sans-serif" font-weight="bold" font-size="11" fill="#10b981" text-anchor="middle">Prefix: "fl"</text>
    <text x="98" y="152" font-family="sans-serif" font-weight="bold" font-size="11" fill="#ef4444" text-anchor="middle">Mismatch!</text>
  </g>

  <!-- Explanation footer -->
  <g transform="translate(40, 255)" font-family="sans-serif" font-size="12" fill="#94a3b8">
    <text x="210" y="0" font-weight="bold" fill="#f8fafc" text-anchor="middle">Vertical Scan Algorithm:</text>
    <text x="210" y="20" text-anchor="middle">Compare characters at index <tspan font-weight="bold" fill="#f8fafc">i</tspan> vertically. If any string differs or terminates,</text>
    <text x="210" y="36" text-anchor="middle">return the prefix collected up to index <tspan font-weight="bold" fill="#f8fafc">i-1</tspan>.</text>
  </g>
</svg>
