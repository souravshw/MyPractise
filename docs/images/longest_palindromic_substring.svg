<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="100%" height="100%">
  <!-- Background Slate -->
  <rect width="100%" height="100%" rx="16" fill="#1e293b"/>
  <!-- Grid overlay -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>
    <marker id="arrow-left" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
    <marker id="arrow-right" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>

  <text x="250" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="16" fill="#f8fafc" text-anchor="middle">Longest Palindromic Substring: "babad"</text>

  <!-- Array of characters -->
  <g transform="translate(100, 70)" font-family="monospace" font-weight="bold" font-size="18" fill="#f8fafc">
    
    <!-- b -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="45" height="45" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
      <text x="22.5" y="28" text-anchor="middle">b</text>
      <text x="22.5" y="65" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle">0</text>
    </g>

    <!-- a -->
    <g transform="translate(60, 0)">
      <rect x="0" y="0" width="45" height="45" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
      <text x="22.5" y="28" fill="#10b981" text-anchor="middle">a</text>
      <text x="22.5" y="65" font-family="sans-serif" font-size="11" fill="#10b981" text-anchor="middle">1</text>
    </g>

    <!-- b (Center of expansion) -->
    <g transform="translate(120, 0)">
      <rect x="0" y="0" width="45" height="45" rx="6" fill="#334155" stroke="#f43f5e" stroke-width="2.5"/>
      <text x="22.5" y="28" fill="#f43f5e" text-anchor="middle">b</text>
      <text x="22.5" y="65" font-family="sans-serif" font-size="11" fill="#f43f5e" text-anchor="middle">2</text>
      <text x="22.5" y="-12" font-family="sans-serif" font-weight="bold" font-size="11" fill="#f43f5e" text-anchor="middle">Center</text>
    </g>

    <!-- a -->
    <g transform="translate(180, 0)">
      <rect x="0" y="0" width="45" height="45" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
      <text x="22.5" y="28" fill="#10b981" text-anchor="middle">a</text>
      <text x="22.5" y="65" font-family="sans-serif" font-size="11" fill="#10b981" text-anchor="middle">3</text>
    </g>

    <!-- d -->
    <g transform="translate(240, 0)">
      <rect x="0" y="0" width="45" height="45" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
      <text x="22.5" y="28" text-anchor="middle">d</text>
      <text x="22.5" y="65" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle">4</text>
    </g>

    <!-- Expansion arrows from Center (index 2) outwards to index 1 and 3 -->
    <path d="M 115 22 L 65 22" fill="none" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow-left)"/>
    <path d="M 170 22 L 220 22" fill="none" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow-right)"/>
  </g>

  <!-- Result boundary box -->
  <g transform="translate(155, 170)" font-family="sans-serif" font-size="12" fill="#94a3b8">
    <rect x="-10" y="0" width="210" height="50" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <text x="95" y="20" font-weight="bold" fill="#f8fafc" text-anchor="middle">Palindromic Substring:</text>
    <text x="95" y="38" font-family="monospace" font-weight="bold" font-size="14" fill="#10b981" text-anchor="middle">"aba" (len = 3)</text>
  </g>

  <!-- Explanation footer -->
  <g transform="translate(40, 260)" font-family="sans-serif" font-size="12" fill="#94a3b8">
    <text x="210" y="0" text-anchor="middle">Expand outwards from each center <tspan font-weight="bold" fill="#f8fafc">i</tspan> (odd: i, even: i &amp; i+1).</text>
    <text x="210" y="16" text-anchor="middle">Compare characters while they match and indexes are in bounds.</text>
  </g>
</svg>
