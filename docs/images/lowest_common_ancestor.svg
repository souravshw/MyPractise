<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="100%" height="100%">
  <!-- Background Slate -->
  <rect width="100%" height="100%" rx="16" fill="#1e293b"/>
  <!-- Grid overlay -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>

  <text x="250" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="16" fill="#f8fafc" text-anchor="middle">Lowest Common Ancestor (LCA) in Binary Tree</text>

  <!-- Tree Structure -->
  <g transform="translate(60, 50)">
    <!-- Connections -->
    <!-- Highlighted path from LCA 3 to 5 (neon orange) and to 1 (neon pink) -->
    <line x1="180" y1="30" x2="100" y2="90" stroke="#f43f5e" stroke-width="3"/>
    <line x1="180" y1="30" x2="260" y2="90" stroke="#a855f7" stroke-width="3"/>
    
    <line x1="100" y1="90" x2="60" y2="150" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <line x1="100" y1="90" x2="140" y2="150" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    
    <line x1="140" y1="150" x2="110" y2="210" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <line x1="140" y1="150" x2="170" y2="210" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

    <line x1="260" y1="90" x2="220" y2="150" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <line x1="260" y1="90" x2="300" y2="150" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

    <!-- Root: LCA (3) -->
    <circle cx="180" cy="30" r="18" fill="#1e293b" stroke="#eab308" stroke-width="3"/>
    <text x="180" y="35" font-family="monospace" font-weight="bold" font-size="14" fill="#f8fafc" text-anchor="middle">3</text>
    <text x="180" y="5" font-family="sans-serif" font-size="10" fill="#eab308" font-weight="bold" text-anchor="middle">LCA</text>

    <!-- Node 5 (Target P) -->
    <circle cx="100" cy="90" r="16" fill="#f43f5e" stroke="#1e293b" stroke-width="1.5"/>
    <text x="100" y="94" font-family="monospace" font-weight="bold" font-size="13" fill="#f8fafc" text-anchor="middle">5</text>
    <text x="65" y="94" font-family="sans-serif" font-size="11" fill="#f43f5e" font-weight="bold" text-anchor="middle">Node p</text>

    <!-- Node 1 (Target Q) -->
    <circle cx="260" cy="90" r="16" fill="#a855f7" stroke="#1e293b" stroke-width="1.5"/>
    <text x="260" y="94" font-family="monospace" font-weight="bold" font-size="13" fill="#f8fafc" text-anchor="middle">1</text>
    <text x="295" y="94" font-family="sans-serif" font-size="11" fill="#a855f7" font-weight="bold" text-anchor="middle">Node q</text>

    <!-- Other nodes -->
    <!-- Under 5 -->
    <circle cx="60" cy="150" r="14" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
    <text x="60" y="154" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">6</text>

    <circle cx="140" cy="150" r="14" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
    <text x="140" y="154" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">2</text>

    <!-- Under 2 -->
    <circle cx="110" cy="210" r="14" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
    <text x="110" y="214" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">7</text>

    <circle cx="170" cy="210" r="14" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
    <text x="170" y="214" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">4</text>

    <!-- Under 1 -->
    <circle cx="220" cy="150" r="14" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
    <text x="220" y="154" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">0</text>

    <circle cx="300" cy="150" r="14" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
    <text x="300" y="154" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">8</text>
  </g>

  <!-- Explanation footer -->
  <g transform="translate(40, 290)" font-family="sans-serif" font-size="12" fill="#94a3b8">
    <text x="210" y="0" text-anchor="middle">LCA is the shared ancestor where paths to <tspan fill="#f43f5e" font-weight="bold">p</tspan> and <tspan fill="#a855f7" font-weight="bold">q</tspan> split.</text>
    <text x="210" y="20" text-anchor="middle" font-size="11" fill="#64748b">If one node is an ancestor of the other (e.g. 5 and 4), it is the LCA itself.</text>
  </g>
</svg>
