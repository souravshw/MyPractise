<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="100%" height="100%">
  <!-- Background Slate -->
  <rect width="100%" height="100%" rx="16" fill="#1e293b"/>
  <!-- Grid overlay -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
    </marker>
    <marker id="merge-arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>

  <text x="250" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="16" fill="#f8fafc" text-anchor="middle">Merge Two Sorted Linked Lists</text>

  <!-- Input List 1 -->
  <g transform="translate(40, 70)" font-family="monospace" font-weight="bold" font-size="14" fill="#f8fafc">
    <text x="0" y="-12" font-family="sans-serif" font-size="11" fill="#94a3b8" font-weight="bold">List 1:</text>
    
    <!-- Nodes: 1 -> 3 -> 5 -->
    <rect x="0" y="0" width="30" height="30" rx="4" fill="#334155" stroke="rgba(255,255,255,0.05)"/>
    <text x="15" y="20" text-anchor="middle">1</text>
    <line x1="30" y1="15" x2="65" y2="15" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="70" y="0" width="30" height="30" rx="4" fill="#334155" stroke="#10b981" stroke-width="1.5"/>
    <text x="15" y="20" transform="translate(70, 0)" text-anchor="middle">3</text>
    <text x="85" y="42" font-family="sans-serif" font-size="9" fill="#10b981" text-anchor="middle">l1</text>
    <line x1="30" y1="15" x2="65" y2="15" transform="translate(70, 0)" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="140" y="0" width="30" height="30" rx="4" fill="#334155" stroke="rgba(255,255,255,0.05)"/>
    <text x="15" y="20" transform="translate(140, 0)" text-anchor="middle">5</text>
  </g>

  <!-- Input List 2 -->
  <g transform="translate(40, 150)" font-family="monospace" font-weight="bold" font-size="14" fill="#f8fafc">
    <text x="0" y="-12" font-family="sans-serif" font-size="11" fill="#94a3b8" font-weight="bold">List 2:</text>
    
    <!-- Nodes: 2 -> 4 -> 6 -->
    <rect x="0" y="0" width="30" height="30" rx="4" fill="#334155" stroke="#10b981" stroke-width="1.5"/>
    <text x="15" y="20" text-anchor="middle">2</text>
    <text x="15" y="42" font-family="sans-serif" font-size="9" fill="#10b981" text-anchor="middle">l2</text>
    <line x1="30" y1="15" x2="65" y2="15" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="70" y="0" width="30" height="30" rx="4" fill="#334155" stroke="rgba(255,255,255,0.05)"/>
    <text x="15" y="20" transform="translate(70, 0)" text-anchor="middle">4</text>
    <line x1="30" y1="15" x2="65" y2="15" transform="translate(70, 0)" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="140" y="0" width="30" height="30" rx="4" fill="#334155" stroke="rgba(255,255,255,0.05)"/>
    <text x="15" y="20" transform="translate(140, 0)" text-anchor="middle">6</text>
  </g>

  <!-- Comparison & Link Actions -->
  <g transform="translate(240, 110)">
    <rect x="0" y="0" width="220" height="90" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <text x="110" y="20" font-family="sans-serif" font-weight="bold" font-size="11" fill="#f8fafc" text-anchor="middle">Step: Compare l1.val &amp; l2.val</text>
    <text x="110" y="40" font-family="monospace" font-size="12" fill="#10b981" text-anchor="middle">l2.val (2) &lt; l1.val (3)</text>
    <text x="110" y="60" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Action: Connect current node to l2,</text>
    <text x="110" y="75" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">then advance l2 pointer.</text>
  </g>

  <!-- Merged Output List (Partially merged) -->
  <g transform="translate(40, 240)" font-family="monospace" font-weight="bold" font-size="14" fill="#f8fafc">
    <text x="0" y="-12" font-family="sans-serif" font-size="11" fill="#94a3b8" font-weight="bold">Merged List:</text>
    
    <!-- Dummy -> 1 -> 2 (linking next to 3) -->
    <rect x="0" y="0" width="50" height="30" rx="4" fill="#475569" stroke="rgba(255,255,255,0.05)"/>
    <text x="25" y="20" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">dummy</text>
    <line x1="50" y1="15" x2="85" y2="15" stroke="#10b981" stroke-width="1.5" marker-end="url(#merge-arrow)"/>

    <rect x="90" y="0" width="30" height="30" rx="4" fill="#334155" stroke="rgba(255,255,255,0.05)"/>
    <text x="15" y="20" transform="translate(90, 0)" text-anchor="middle">1</text>
    <line x1="30" y1="15" x2="65" y2="15" transform="translate(90, 0)" stroke="#10b981" stroke-width="1.5" marker-end="url(#merge-arrow)"/>

    <rect x="160" y="0" width="30" height="30" rx="4" fill="#334155" stroke="#10b981" stroke-width="2"/>
    <text x="15" y="20" transform="translate(160, 0)" text-anchor="middle">2</text>
    <path d="M 190 15 Q 230 15 250 -35" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text x="200" y="42" font-family="sans-serif" font-size="9" fill="#10b981" text-anchor="middle">tail</text>
  </g>
</svg>
