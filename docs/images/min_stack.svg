<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="100%" height="100%">
  <!-- Background Slate -->
  <rect width="100%" height="100%" rx="16" fill="#1e293b"/>
  <!-- Grid overlay -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>

  <text x="250" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="16" fill="#f8fafc" text-anchor="middle">Min Stack Implementation (O(1) getMin)</text>

  <!-- Main Stack -->
  <g transform="translate(80, 70)">
    <text x="50" y="-15" font-family="sans-serif" font-weight="bold" font-size="13" fill="#94a3b8" text-anchor="middle">Main Stack</text>
    
    <!-- Stack container structure (open top) -->
    <path d="M 10 0 L 10 170 L 90 170 L 90 0" fill="none" stroke="#3b82f6" stroke-width="3"/>

    <!-- Stack elements -->
    <g font-family="monospace" font-weight="bold" font-size="16" fill="#f8fafc">
      <!-- Item 4: 1 -->
      <rect x="15" y="10" width="70" height="30" rx="4" fill="#10b981" stroke="rgba(255,255,255,0.05)"/>
      <text x="50" y="30" text-anchor="middle">1</text>
      
      <!-- Item 3: 7 -->
      <rect x="15" y="50" width="70" height="30" rx="4" fill="#334155" stroke="rgba(255,255,255,0.05)"/>
      <text x="50" y="70" text-anchor="middle">7</text>

      <!-- Item 2: 2 -->
      <rect x="15" y="90" width="70" height="30" rx="4" fill="#334155" stroke="rgba(255,255,255,0.05)"/>
      <text x="50" y="110" text-anchor="middle">2</text>

      <!-- Item 1: 5 -->
      <rect x="15" y="130" width="70" height="30" rx="4" fill="#334155" stroke="rgba(255,255,255,0.05)"/>
      <text x="50" y="150" text-anchor="middle">5</text>
    </g>
    <text x="50" y="195" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Standard push/pop</text>
  </g>

  <!-- Sync lines showing min tracking -->
  <g transform="translate(180, 70)" stroke="#14b8a6" stroke-width="2" stroke-dasharray="2 2">
    <line x1="10" y1="25" x2="130" y2="25"/>
    <line x1="10" y1="65" x2="130" y2="65"/>
    <line x1="10" y1="105" x2="130" y2="105"/>
    <line x1="10" y1="145" x2="130" y2="145"/>
  </g>

  <!-- Min Stack -->
  <g transform="translate(320, 70)">
    <text x="50" y="-15" font-family="sans-serif" font-weight="bold" font-size="13" fill="#94a3b8" text-anchor="middle">Min Stack</text>
    
    <!-- Stack container structure (open top) -->
    <path d="M 10 0 L 10 170 L 90 170 L 90 0" fill="none" stroke="#14b8a6" stroke-width="3"/>

    <!-- Min Stack elements (tracks minimum at each step) -->
    <g font-family="monospace" font-weight="bold" font-size="16" fill="#f8fafc">
      <!-- Item 4: getMin() = 1 -->
      <rect x="15" y="10" width="70" height="30" rx="4" fill="#10b981" stroke="rgba(255,255,255,0.05)"/>
      <text x="50" y="30" text-anchor="middle">1</text>
      
      <!-- Item 3: getMin() = 2 -->
      <rect x="15" y="50" width="70" height="30" rx="4" fill="#1e293b" stroke="#14b8a6" stroke-width="1"/>
      <text x="50" y="70" fill="#14b8a6" text-anchor="middle">2</text>

      <!-- Item 2: getMin() = 2 -->
      <rect x="15" y="90" width="70" height="30" rx="4" fill="#1e293b" stroke="#14b8a6" stroke-width="1"/>
      <text x="50" y="110" fill="#14b8a6" text-anchor="middle">2</text>

      <!-- Item 1: getMin() = 5 -->
      <rect x="15" y="130" width="70" height="30" rx="4" fill="#1e293b" stroke="#14b8a6" stroke-width="1"/>
      <text x="50" y="150" fill="#14b8a6" text-anchor="middle">5</text>
    </g>
    <text x="50" y="195" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Tracks min-so-far</text>
  </g>

  <!-- Explanation Footer -->
  <g transform="translate(40, 290)" font-family="sans-serif" font-size="12" fill="#94a3b8">
    <text x="210" y="0" font-weight="bold" fill="#f8fafc" text-anchor="middle">Sync Rule on push(x):</text>
    <text x="210" y="20" text-anchor="middle">Push <tspan fill="#10b981" font-weight="bold">Math.min(x, minStack.peek())</tspan> onto the <tspan fill="#14b8a6">Min Stack</tspan>.</text>
    <text x="210" y="36" text-anchor="middle">This ensures the minimum value is always at the top of the Min Stack (O(1) time).</text>
  </g>
</svg>
