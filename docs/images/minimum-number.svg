<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>
  <text x="400" y="50" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">Construct Minimum Number Algorithm</text>
  <text x="400" y="75" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5" text-anchor="middle">Counting digits and concatenating in ascending order</text>

  <!-- Input digits -->
  <g transform="translate(100, 130)">
    <text x="0" y="30" font-family="'Segoe UI', sans-serif" font-size="14" fill="#887DA5">Input digits: "50122"</text>
    
    <!-- digit counts buckets -->
    <g transform="translate(0, 50)">
      <!-- 0 bucket -->
      <rect x="0" y="0" width="80" height="80" rx="4" fill="#140F27" stroke="#5C42A5" stroke-width="1"/>
      <text x="40" y="25" font-family="monospace" font-size="20" fill="#FFA5A5" text-anchor="middle">[0]</text>
      <text x="40" y="60" font-family="'Segoe UI', sans-serif" font-size="12" fill="#D2C8E3" text-anchor="middle">Count: 1</text>
      
      <!-- 1 bucket -->
      <rect x="100" y="0" width="80" height="80" rx="4" fill="#140F27" stroke="#5C42A5" stroke-width="1"/>
      <text x="140" y="25" font-family="monospace" font-size="20" fill="#FFA5A5" text-anchor="middle">[1]</text>
      <text x="140" y="60" font-family="'Segoe UI', sans-serif" font-size="12" fill="#D2C8E3" text-anchor="middle">Count: 1</text>

      <!-- 2 bucket -->
      <rect x="200" y="0" width="80" height="80" rx="4" fill="#140F27" stroke="#5C42A5" stroke-width="1"/>
      <text x="240" y="25" font-family="monospace" font-size="20" fill="#FFA5A5" text-anchor="middle">[2]</text>
      <text x="240" y="60" font-family="'Segoe UI', sans-serif" font-size="12" fill="#D2C8E3" text-anchor="middle">Count: 2</text>

      <!-- 5 bucket -->
      <rect x="300" y="0" width="80" height="80" rx="4" fill="#140F27" stroke="#5C42A5" stroke-width="1"/>
      <text x="340" y="25" font-family="monospace" font-size="20" fill="#FFA5A5" text-anchor="middle">[5]</text>
      <text x="340" y="60" font-family="'Segoe UI', sans-serif" font-size="12" fill="#D2C8E3" text-anchor="middle">Count: 1</text>
    </g>
  </g>

  <!-- Output construction -->
  <g transform="translate(100, 310)">
    <text x="0" y="30" font-family="'Segoe UI', sans-serif" font-size="14" fill="#887DA5">Resulting Minimum Number:</text>
    
    <g transform="translate(230, 5)">
      <rect x="0" y="0" width="220" height="50" rx="6" fill="#1A182E" stroke="#00FF87" stroke-width="2"/>
      <text x="110" y="35" font-family="monospace" font-size="26" font-weight="bold" fill="#00FF87" text-anchor="middle">01225</text>
    </g>
  </g>
</svg>
