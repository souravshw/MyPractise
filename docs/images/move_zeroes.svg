<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="100%" height="100%">
  <!-- Background Slate -->
  <rect width="100%" height="100%" rx="16" fill="#1e293b"/>
  <!-- Grid overlay -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>

  <text x="250" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="16" fill="#f8fafc" text-anchor="middle">Move Zeroes (In-Place Array Partitioning)</text>

  <!-- Array visual -->
  <g transform="translate(60, 70)" font-family="monospace" font-weight="bold" font-size="16" fill="#f8fafc">
    
    <!-- Cell 0: 0 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="50" height="50" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
      <text x="25" y="30" fill="#64748b" text-anchor="middle">0</text>
      <text x="25" y="65" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle">idx 0</text>
    </g>

    <!-- Cell 1: 1 -->
    <g transform="translate(60, 0)">
      <rect x="0" y="0" width="50" height="50" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
      <text x="25" y="30" fill="#10b981" text-anchor="middle">1</text>
      <text x="25" y="65" font-family="sans-serif" font-size="11" fill="#10b981" text-anchor="middle">idx 1</text>
      <text x="25" y="-10" font-family="sans-serif" font-size="10" fill="#10b981" text-anchor="middle">writeIdx</text>
    </g>

    <!-- Cell 2: 0 -->
    <g transform="translate(120, 0)">
      <rect x="0" y="0" width="50" height="50" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
      <text x="25" y="30" fill="#64748b" text-anchor="middle">0</text>
      <text x="25" y="65" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle">idx 2</text>
    </g>

    <!-- Cell 3: 3 -->
    <g transform="translate(180, 0)">
      <rect x="0" y="0" width="50" height="50" rx="6" fill="#334155" stroke="#3b82f6" stroke-width="2"/>
      <text x="25" y="30" fill="#f8fafc" text-anchor="middle">3</text>
      <text x="25" y="65" font-family="sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle">idx 3</text>
      <text x="25" y="-10" font-family="sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">curr (i)</text>
    </g>

    <!-- Cell 4: 12 -->
    <g transform="translate(240, 0)">
      <rect x="0" y="0" width="50" height="50" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
      <text x="25" y="30" text-anchor="middle">12</text>
      <text x="25" y="65" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle">idx 4</text>
    </g>

    <!-- Write action path -->
    <path d="M 205 0 C 180 -30, 110 -30, 85 0" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="3 3"/>
    <text x="145" y="-28" font-family="sans-serif" font-size="10" fill="#10b981" text-anchor="middle">Copy non-zero: arr[writeIdx] = arr[i]</text>
  </g>

  <!-- Final array visual -->
  <g transform="translate(60, 190)" font-family="monospace" font-weight="bold" font-size="14" fill="#94a3b8">
    <text x="0" y="-10" font-family="sans-serif" font-size="11" font-weight="bold" fill="#f8fafc">Result after complete scan and zero-fill:</text>
    
    <!-- Result Cells -->
    <rect x="0" y="0" width="40" height="30" rx="4" fill="#1e293b" stroke="#10b981"/>
    <text x="20" y="20" fill="#10b981" text-anchor="middle">1</text>

    <rect x="45" y="0" width="40" height="30" rx="4" fill="#1e293b" stroke="#10b981"/>
    <text x="20" y="20" fill="#10b981" text-anchor="middle">3</text>

    <rect x="90" y="0" width="40" height="30" rx="4" fill="#1e293b" stroke="#10b981"/>
    <text x="20" y="20" fill="#10b981" text-anchor="middle">12</text>

    <!-- Zeroes -->
    <rect x="135" y="0" width="40" height="30" rx="4" fill="#334155"/>
    <text x="20" y="20" fill="#64748b" text-anchor="middle">0</text>

    <rect x="180" y="0" width="40" height="30" rx="4" fill="#334155"/>
    <text x="20" y="20" fill="#64748b" text-anchor="middle">0</text>
  </g>

  <!-- Explanation footer -->
  <g transform="translate(40, 260)" font-family="sans-serif" font-size="12" fill="#94a3b8">
    <text x="210" y="0" text-anchor="middle">Scan array with <tspan fill="#3b82f6" font-weight="bold">i</tspan>; copy all non-zero elements to <tspan fill="#10b981" font-weight="bold">writeIdx</tspan>, then fill remaining slots with 0.</text>
  </g>
</svg>
