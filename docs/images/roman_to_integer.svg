<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="100%" height="100%">
  <!-- Background Slate -->
  <rect width="100%" height="100%" rx="16" fill="#1e293b"/>
  <!-- Grid overlay -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>

  <text x="250" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="16" fill="#f8fafc" text-anchor="middle">Roman to Integer: "MCMXCIV" (1994)</text>

  <!-- Left-to-right parsing nodes -->
  <g transform="translate(45, 70)" font-family="monospace" font-weight="bold" font-size="16" fill="#f8fafc">
    
    <!-- M -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="45" height="45" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
      <text x="22.5" y="28" fill="#eab308" text-anchor="middle">M</text>
      <text x="22.5" y="65" font-family="sans-serif" font-size="11" fill="#f8fafc" text-anchor="middle">+1000</text>
    </g>

    <!-- CM -->
    <g transform="translate(60, 0)">
      <rect x="0" y="0" width="95" height="45" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
      <text x="25" y="28" fill="#94a3b8" text-anchor="middle">C</text>
      <text x="70" y="28" fill="#eab308" text-anchor="middle">M</text>
      <text x="47.5" y="65" font-family="sans-serif" font-size="11" fill="#10b981" text-anchor="middle">+900</text>
      <text x="47.5" y="80" font-family="sans-serif" font-size="9" fill="#64748b" text-anchor="middle">(1000 - 100)</text>
    </g>

    <!-- XC -->
    <g transform="translate(170, 0)">
      <rect x="0" y="0" width="95" height="45" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
      <text x="25" y="28" fill="#94a3b8" text-anchor="middle">X</text>
      <text x="70" y="28" fill="#eab308" text-anchor="middle">C</text>
      <text x="47.5" y="65" font-family="sans-serif" font-size="11" fill="#10b981" text-anchor="middle">+90</text>
      <text x="47.5" y="80" font-family="sans-serif" font-size="9" fill="#64748b" text-anchor="middle">(100 - 10)</text>
    </g>

    <!-- I -->
    <!-- IV -->
    <g transform="translate(280, 0)">
      <rect x="0" y="0" width="95" height="45" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
      <text x="25" y="28" fill="#94a3b8" text-anchor="middle">I</text>
      <text x="70" y="28" fill="#eab308" text-anchor="middle">V</text>
      <text x="47.5" y="65" font-family="sans-serif" font-size="11" fill="#10b981" text-anchor="middle">+4</text>
      <text x="47.5" y="80" font-family="sans-serif" font-size="9" fill="#64748b" text-anchor="middle">(5 - 1)</text>
    </g>
  </g>

  <!-- Formula block -->
  <g transform="translate(50, 185)" font-family="sans-serif" font-size="12" fill="#94a3b8">
    <text x="0" y="15" font-weight="bold" fill="#f8fafc">Scan rule: If current_val &lt; next_val, subtract current_val. Otherwise add it.</text>
    
    <rect x="-5" y="32" width="410" height="40" rx="6" fill="#334155" stroke="rgba(255,255,255,0.05)"/>
    <text x="200" y="56" font-family="monospace" font-weight="bold" font-size="14" fill="#eab308" text-anchor="middle">1000 + 900 + 90 + 4 = 1994</text>
  </g>
</svg>
