<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>
  <text x="400" y="50" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">Java Serialization &amp; Deserialization</text>
  <text x="400" y="75" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5" text-anchor="middle">Saving object memory states as flat bytes, and rebuilding them later</text>

  <!-- Live Memory Object -->
  <g transform="translate(80, 150)">
    <rect width="200" height="180" rx="8" fill="#140F27" stroke="#3A2075" stroke-width="1.5"/>
    <text x="100" y="35" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#D2C8E3" text-anchor="middle">Live JVM Object</text>
    
    <rect x="20" y="60" width="160" height="40" rx="4" fill="#1A152E" stroke="#5C42A5" stroke-width="1"/>
    <text x="35" y="85" font-family="monospace" font-size="12" fill="#E2D6FF">id = 211</text>

    <rect x="20" y="110" width="160" height="40" rx="4" fill="#1A152E" stroke="#5C42A5" stroke-width="1"/>
    <text x="35" y="135" font-family="monospace" font-size="12" fill="#E2D6FF">name = "ravi"</text>
  </g>

  <!-- Byte Stream flattening -->
  <g transform="translate(320, 200)">
    <path d="M0 30 L100 30" stroke="#00FF87" stroke-width="3" stroke-dasharray="6"/>
    <text x="50" y="15" font-family="'Segoe UI', sans-serif" font-size="12" fill="#00FF87" text-anchor="middle">Serialize</text>
    
    <!-- Flat Byte Stream -->
    <rect x="110" y="10" width="100" height="40" rx="4" fill="#0C2518" stroke="#00FF87" stroke-width="1.5"/>
    <text x="160" y="35" font-family="monospace" font-size="11" fill="#00FF87" text-anchor="middle">AC ED 00 05...</text>

    <path d="M220 30 L320 30" stroke="#E2D6FF" stroke-width="3" stroke-dasharray="6"/>
    <text x="270" y="15" font-family="'Segoe UI', sans-serif" font-size="12" fill="#E2D6FF" text-anchor="middle">Deserialize</text>
  </g>

  <!-- Restored Object -->
  <g transform="translate(680, 150)">
    <!-- Shifted right -->
  </g>
  
  <g transform="translate(560, 150)">
    <rect width="180" height="180" rx="8" fill="#1A182E" stroke="#5C42A5" stroke-width="1.5"/>
    <text x="90" y="35" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#E2D6FF" text-anchor="middle">Restored Object</text>
    
    <rect x="15" y="60" width="150" height="40" rx="4" fill="#140F27" stroke="#3A2075" stroke-width="1"/>
    <text x="30" y="85" font-family="monospace" font-size="12" fill="#887DA5">id = 211</text>

    <rect x="15" y="115" width="150" height="40" rx="4" fill="#140F27" stroke="#3A2075" stroke-width="1"/>
    <text x="30" y="140" font-family="monospace" font-size="12" fill="#887DA5">name = "ravi"</text>
  </g>
</svg>
