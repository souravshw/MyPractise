<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>
  <text x="400" y="50" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">Serialization &amp; Class Inheritance</text>
  <text x="400" y="75" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5" text-anchor="middle">How parent class serialization propagates automatically to subclasses</text>

  <!-- Super class box -->
  <g transform="translate(150, 140)">
    <rect width="220" height="200" rx="6" fill="#140F27" stroke="#00FF87" stroke-width="2"/>
    <text x="110" y="35" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#00FF87" text-anchor="middle">Superclass (Person)</text>
    <text x="110" y="55" font-family="'Segoe UI', sans-serif" font-size="11" fill="#887DA5" text-anchor="middle">implements Serializable</text>
    
    <rect x="20" y="80" width="180" height="90" rx="4" fill="#1A152E" stroke="#3A2075" stroke-width="1"/>
    <text x="35" y="110" font-family="monospace" font-size="12" fill="#D2C8E3">int id;</text>
    <text x="35" y="140" font-family="monospace" font-size="12" fill="#D2C8E3">String name;</text>
  </g>

  <!-- Subclass box with arrow -->
  <g transform="translate(480, 140)">
    <rect width="220" height="200" rx="6" fill="#1A182E" stroke="#5C42A5" stroke-width="1.5"/>
    <text x="110" y="35" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#E2D6FF" text-anchor="middle">Subclass (Student)</text>
    <text x="110" y="55" font-family="'Segoe UI', sans-serif" font-size="11" fill="#887DA5" text-anchor="middle">extends Person</text>
    
    <rect x="20" y="80" width="180" height="90" rx="4" fill="#140F27" stroke="#3A2075" stroke-width="1"/>
    <text x="35" y="110" font-family="monospace" font-size="12" fill="#887DA5">String course;</text>
    <text x="35" y="140" font-family="monospace" font-size="12" fill="#887DA5">int fee;</text>
    <text x="110" y="185" font-family="'Segoe UI', sans-serif" font-size="11" fill="#00FF87" font-weight="bold" text-anchor="middle">Auto-Serializable!</text>
  </g>

  <!-- Inheritance arrow -->
  <path d="M470 240 L380 240" stroke="#00FF87" stroke-width="2.5" fill="none"/>
  <text x="425" y="225" font-family="'Segoe UI', sans-serif" font-size="11" fill="#00FF87" text-anchor="middle">Is-A</text>
</svg>
