<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="100%" height="100%">
  <!-- Background Slate -->
  <rect width="100%" height="100%" rx="16" fill="#1e293b"/>
  <!-- Grid overlay -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>

  <text x="250" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="16" fill="#f8fafc" text-anchor="middle">Sliding Window Maximum (k = 3)</text>

  <!-- Array Elements -->
  <g transform="translate(40, 70)" font-family="monospace" font-weight="bold" font-size="16" fill="#f8fafc">
    <!-- Array Title -->
    <text x="0" y="-15" font-family="sans-serif" font-weight="bold" font-size="12" fill="#94a3b8">Input Array:</text>

    <!-- Cells -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="50" height="50" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
      <text x="25" y="30" text-anchor="middle">1</text>
      <text x="25" y="65" font-size="11" fill="#64748b" text-anchor="middle">i=0</text>
    </g>

    <g transform="translate(52, 0)">
      <rect x="0" y="0" width="50" height="50" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
      <text x="25" y="30" text-anchor="middle" fill="#14b8a6">3</text>
      <text x="25" y="65" font-size="11" fill="#64748b" text-anchor="middle">i=1</text>
    </g>

    <g transform="translate(104, 0)">
      <rect x="0" y="0" width="50" height="50" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
      <text x="25" y="30" text-anchor="middle" fill="#14b8a6">-1</text>
      <text x="25" y="65" font-size="11" fill="#64748b" text-anchor="middle">i=2</text>
    </g>

    <g transform="translate(156, 0)">
      <rect x="0" y="0" width="50" height="50" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
      <text x="25" y="30" text-anchor="middle" fill="#14b8a6">-3</text>
      <text x="25" y="65" font-size="11" fill="#64748b" text-anchor="middle">i=3</text>
    </g>

    <g transform="translate(208, 0)">
      <rect x="0" y="0" width="50" height="50" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
      <text x="25" y="30" text-anchor="middle">5</text>
      <text x="25" y="65" font-size="11" fill="#64748b" text-anchor="middle">i=4</text>
    </g>

    <g transform="translate(260, 0)">
      <rect x="0" y="0" width="50" height="50" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
      <text x="25" y="30" text-anchor="middle">3</text>
      <text x="25" y="65" font-size="11" fill="#64748b" text-anchor="middle">i=5</text>
    </g>

    <g transform="translate(312, 0)">
      <rect x="0" y="0" width="50" height="50" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
      <text x="25" y="30" text-anchor="middle">6</text>
      <text x="25" y="65" font-size="11" fill="#64748b" text-anchor="middle">i=6</text>
    </g>

    <g transform="translate(364, 0)">
      <rect x="0" y="0" width="50" height="50" rx="6" fill="#334155" stroke="rgba(255,255,255,0.1)"/>
      <text x="25" y="30" text-anchor="middle">7</text>
      <text x="25" y="65" font-size="11" fill="#64748b" text-anchor="middle">i=7</text>
    </g>

    <!-- Sliding Window Border [i=1 to 3] -->
    <rect x="50" y="-5" width="158" height="60" rx="8" fill="none" stroke="#22c55e" stroke-width="3" stroke-dasharray="2 2"/>
    <text x="130" y="-12" font-family="sans-serif" font-weight="bold" font-size="11" fill="#22c55e" text-anchor="middle">Current Window</text>
  </g>

  <!-- Monotonic Deque -->
  <g transform="translate(40, 190)">
    <text x="0" y="-15" font-family="sans-serif" font-weight="bold" font-size="12" fill="#94a3b8">Monotonic Deque (stores indices, values decreasing):</text>

    <!-- Deque Container -->
    <rect x="0" y="0" width="220" height="50" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    
    <!-- Deque Contents (Front to Back) -->
    <!-- Front: Index 1 (value 3) -->
    <g transform="translate(20, 10)" font-family="monospace" font-weight="bold" font-size="14" fill="#f8fafc">
      <rect x="0" y="0" width="80" height="30" rx="4" fill="#8b5cf6"/>
      <text x="40" y="20" text-anchor="middle">idx 1 (val 3)</text>
    </g>

    <!-- Back: Index 2 (value -1) -->
    <g transform="translate(120, 10)" font-family="monospace" font-weight="bold" font-size="14" fill="#f8fafc">
      <rect x="0" y="0" width="80" height="30" rx="4" fill="#475569"/>
      <text x="40" y="20" text-anchor="middle">idx 2 (val -1)</text>
    </g>

    <text x="-15" y="30" font-family="sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle" font-weight="bold">FRONT</text>
    <text x="235" y="30" font-family="sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle" font-weight="bold">BACK</text>
  </g>

  <!-- Explanation Box -->
  <g transform="translate(40, 275)" font-family="sans-serif" font-size="12" fill="#94a3b8">
    <text x="0" y="0" font-weight="bold" fill="#f8fafc">Execution state at index i = 3 (element = -3):</text>
    <text x="0" y="20">1. Remove indices out of current window (idx 0 is already gone).</text>
    <text x="0" y="36">2. Evict smaller elements from back of Deque (none, as -1 &gt; -3).</text>
    <text x="0" y="52">3. Max value is at front of Deque: <tspan fill="#22c55e" font-weight="bold">val 3</tspan> (index 1).</text>
  </g>
</svg>
