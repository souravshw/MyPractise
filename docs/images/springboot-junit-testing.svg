<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <!-- Node Glow Filters -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#38bdf8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="url(#bg-grad)" />
  <rect width="796" height="446" x="2" y="2" rx="14" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" />

  <!-- Title -->
  <text x="400" y="45" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" letter-spacing="1">
    UNIT TESTING VS. INTEGRATION TESTING
  </text>
  <text x="400" y="70" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    Mocking isolated dependencies vs. Booting the entire Spring application context
  </text>

  <!-- 1. LEFT PANEL: UNIT TESTING (MOCKITO) -->
  <g transform="translate(50, 100)">
    <rect width="320" height="280" rx="10" fill="#1e293b" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1.5" />
    <rect width="320" height="35" rx="10" fill="#38bdf8" opacity="0.1" />
    <text x="160" y="22" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#38bdf8" text-anchor="middle">Unit Testing (Mockito Mocking)</text>

    <!-- Component Under Test -->
    <g transform="translate(20, 60)">
      <rect width="120" height="60" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5" filter="url(#glow-blue)" />
      <text x="60" y="28" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">UserController</text>
      <text x="60" y="45" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#93c5fd" text-anchor="middle">Class Under Test</text>
    </g>

    <!-- Mock Dependency -->
    <g transform="translate(180, 60)">
      <rect width="120" height="60" rx="6" fill="#3f1d38" stroke="#a21caf" stroke-width="1.5" stroke-dasharray="3,3" filter="url(#glow-purple)" />
      <text x="60" y="28" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">UserService</text>
      <text x="60" y="45" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#f472b6" font-weight="bold" text-anchor="middle">MOCK OBJECT</text>
    </g>

    <!-- Communication Arrow -->
    <path d="M 145 90 L 175 90" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)" />
    <text x="160" y="80" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Calls</text>

    <!-- Setup code labels -->
    <rect x="20" y="145" width="280" height="110" rx="6" fill="#0f172a" stroke="rgba(255,255,255,0.05)" />
    <text x="35" y="170" font-family="'Courier New', monospace" font-size="11" fill="#f472b6">@Mock</text>
    <text x="35" y="185" font-family="'Courier New', monospace" font-size="11" fill="#94a3b8">private UserService userService;</text>
    
    <text x="35" y="215" font-family="'Courier New', monospace" font-size="11" fill="#38bdf8">@InjectMocks</text>
    <text x="35" y="230" font-family="'Courier New', monospace" font-size="11" fill="#94a3b8">private UserController controller;</text>

    <text x="160" y="272" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Fast execution. No database or network boot.</text>
  </g>

  <!-- 2. RIGHT PANEL: INTEGRATION TESTING (@SpringBootTest) -->
  <g transform="translate(430, 100)">
    <rect width="320" height="280" rx="10" fill="#1e293b" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1.5" />
    <rect width="320" height="35" rx="10" fill="#10b981" opacity="0.1" />
    <text x="160" y="22" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#10b981" text-anchor="middle">Integration Testing (@SpringBootTest)</text>

    <!-- Controller -->
    <g transform="translate(15, 60)">
      <rect width="85" height="50" rx="4" fill="#064e3b" stroke="#10b981" stroke-width="1.5" />
      <text x="42.5" y="30" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">Controller</text>
    </g>

    <!-- Service -->
    <g transform="translate(115, 60)">
      <rect width="85" height="50" rx="4" fill="#064e3b" stroke="#10b981" stroke-width="1.5" />
      <text x="42.5" y="30" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">Service</text>
    </g>

    <!-- Repository -->
    <g transform="translate(215, 60)">
      <rect width="90" height="50" rx="4" fill="#064e3b" stroke="#10b981" stroke-width="1.5" />
      <text x="45" y="30" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">Repository</text>
    </g>

    <!-- Paths -->
    <path d="M 100 85 L 110 85" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)" />
    <path d="M 200 85 L 210 85" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- HTTP client -->
    <g transform="translate(15, 145)">
      <rect width="290" height="95" rx="6" fill="#0f172a" stroke="rgba(255,255,255,0.05)" />
      <text x="15" y="25" font-family="'Courier New', monospace" font-size="11" fill="#38bdf8">TestRestTemplate / WebTestClient</text>
      <text x="15" y="45" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8">Sends real HTTP requests to random port</text>
      <path d="M 60 85 C 60 70, 45 40, 45 10" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="2,2" />
      <text x="15" y="75" font-family="'Courier New', monospace" font-size="11" fill="#10b981">@SpringBootTest</text>
    </g>

    <!-- Label -->
    <rect x="15" y="250" width="290" height="20" rx="4" fill="#064e3b" opacity="0.3" />
    <text x="160" y="263" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#a7f3d0" text-anchor="middle">Runs full context: DB, Beans, Port binds.</text>
  </g>

  <!-- Explanation footer card -->
  <rect x="50" y="395" width="700" height="35" rx="6" fill="rgba(30, 41, 59, 0.8)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
  <text x="400" y="416" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#cbd5e1" text-anchor="middle">
    Unit tests verify code logic isolation. Integration tests verify components connect and work together.
  </text>
</svg>
