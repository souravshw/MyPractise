<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <!-- Graph Line Gradient -->
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <!-- Area Fill Gradient -->
    <linearGradient id="area-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(16, 185, 129, 0.2)" />
      <stop offset="100%" stop-color="rgba(16, 185, 129, 0.0)" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="url(#bg-grad)" />
  <rect width="796" height="446" x="2" y="2" rx="14" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" />

  <!-- Grid Lines -->
  <line x1="80" y1="350" x2="720" y2="350" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
  <line x1="80" y1="280" x2="720" y2="280" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
  <line x1="80" y1="210" x2="720" y2="210" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
  <line x1="80" y1="140" x2="720" y2="140" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
  <line x1="80" y1="70" x2="720" y2="70" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />

  <!-- Title -->
  <text x="400" y="45" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" letter-spacing="1">
    MAXIMIZING STOCK TRANSACTION PROFITS
  </text>
  <text x="400" y="70" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    Greedy Rollercoaster Valley-to-Peak Accumulation
  </text>

  <!-- Area under curve -->
  <path d="M 100 300 Q 180 250 250 200 T 350 170 L 450 340 L 550 120 Q 600 80 670 60 L 670 350 L 100 350 Z" fill="url(#area-grad)" />

  <!-- Graph Line -->
  <path d="M 100 300 Q 180 250 250 200 T 350 170 L 450 340 L 550 120 Q 600 80 670 60" fill="none" stroke="url(#line-grad)" stroke-width="4" filter="url(#glow)" />

  <!-- Data Nodes -->
  <!-- 100 -->
  <circle cx="100" cy="300" r="6" fill="#3b82f6" stroke="#fff" stroke-width="2" />
  <text x="100" y="325" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="bold" fill="#94a3b8" text-anchor="middle">$100</text>
  <text x="100" y="285" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle" font-weight="bold">BUY</text>

  <!-- 310 -->
  <circle cx="350" cy="170" r="6" fill="#10b981" stroke="#fff" stroke-width="2" />
  <text x="350" y="150" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">$310</text>
  <text x="350" y="190" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#10b981" text-anchor="middle" font-weight="bold">SELL</text>

  <!-- 40 -->
  <circle cx="450" cy="340" r="6" fill="#3b82f6" stroke="#fff" stroke-width="2" />
  <text x="450" y="365" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="bold" fill="#94a3b8" text-anchor="middle">$40</text>
  <text x="450" y="325" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle" font-weight="bold">BUY</text>

  <!-- 695 -->
  <circle cx="670" cy="60" r="6" fill="#10b981" stroke="#fff" stroke-width="2" />
  <text x="670" y="40" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">$695</text>
  <text x="670" y="80" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#10b981" text-anchor="middle" font-weight="bold">SELL</text>

  <!-- Transaction Labels -->
  <!-- Tx 1: $100 -> $310 -->
  <path d="M 120 290 Q 235 210 330 180" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="2,2" />
  <text x="220" y="225" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#34d399" transform="rotate(-15, 220, 225)">+$210 Profit</text>

  <!-- Tx 2: $40 -> $695 -->
  <path d="M 470 320 Q 570 170 650 80" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="2,2" />
  <text x="560" y="180" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#34d399" transform="rotate(-40, 560, 180)">+$655 Profit</text>

  <!-- Summary Card -->
  <g transform="translate(180, 85)">
    <rect width="440" height="42" rx="8" fill="rgba(30, 41, 59, 0.85)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
    <text x="220" y="26" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0" text-anchor="middle">
      Total Accumulated Profit: <tspan fill="#34d399" font-size="15">$210 + $655 = $865</tspan>
    </text>
  </g>
</svg>
