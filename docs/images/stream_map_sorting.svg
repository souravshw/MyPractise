<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <!-- Node Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#38bdf8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="url(#bg-grad)" />
  <rect width="796" height="446" x="2" y="2" rx="14" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" />

  <!-- Title -->
  <text x="400" y="45" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle" letter-spacing="1">
    SORTING MAP BY VALUE USING STREAMS
  </text>
  <text x="400" y="70" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    Streaming entries, sorting by value descending, and collecting in LinkedHashMap
  </text>

  <!-- 1. Input Map Card (HashMap - Unordered) -->
  <g transform="translate(60, 110)">
    <rect width="210" height="260" rx="10" fill="#1e293b" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1.5" />
    <!-- Header -->
    <rect width="210" height="35" rx="10" fill="#475569" opacity="0.3" />
    <text x="105" y="22" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="bold" fill="#cbd5e1" text-anchor="middle">Input Map (Unsorted HashMap)</text>
    
    <!-- Entries -->
    <!-- Key: 500 -> S1 -->
    <g transform="translate(15, 55)">
      <rect width="180" height="40" rx="6" fill="#0f172a" stroke="rgba(255,255,255,0.05)" />
      <text x="15" y="24" font-family="'Courier New', monospace" font-size="12" fill="#38bdf8" font-weight="bold">500</text>
      <text x="60" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#64748b">➔</text>
      <text x="80" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">S1 (Salary: 500)</text>
    </g>
    <!-- Key: 800 -> S2 -->
    <g transform="translate(15, 105)">
      <rect width="180" height="40" rx="6" fill="#0f172a" stroke="rgba(255,255,255,0.05)" />
      <text x="15" y="24" font-family="'Courier New', monospace" font-size="12" fill="#38bdf8" font-weight="bold">800</text>
      <text x="60" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#64748b">➔</text>
      <text x="80" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">S2 (Salary: 800)</text>
    </g>
    <!-- Key: 200 -> S3 -->
    <g transform="translate(15, 155)">
      <rect width="180" height="40" rx="6" fill="#0f172a" stroke="rgba(255,255,255,0.05)" />
      <text x="15" y="24" font-family="'Courier New', monospace" font-size="12" fill="#38bdf8" font-weight="bold">200</text>
      <text x="60" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#64748b">➔</text>
      <text x="80" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">S3 (Salary: 200)</text>
    </g>
    <!-- Key: 900 -> S4 -->
    <g transform="translate(15, 205)">
      <rect width="180" height="40" rx="6" fill="#0f172a" stroke="rgba(255,255,255,0.05)" />
      <text x="15" y="24" font-family="'Courier New', monospace" font-size="12" fill="#38bdf8" font-weight="bold">900</text>
      <text x="60" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#64748b">➔</text>
      <text x="80" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">S4 (Salary: 900)</text>
    </g>
  </g>

  <!-- Connection Arrow 1 -->
  <path d="M 285 240 L 320 240" fill="none" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)" />

  <!-- 2. Stream Sorting Pipeline Card -->
  <g transform="translate(335, 130)">
    <rect width="130" height="220" rx="10" fill="#1e1b4b" stroke="#38bdf8" stroke-width="2" filter="url(#glow)" />
    <!-- Header -->
    <rect width="130" height="35" rx="10" fill="#312e81" />
    <text x="65" y="22" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="bold" fill="#38bdf8" text-anchor="middle">Stream Pipeline</text>
    <!-- Pipeline operations -->
    <text x="65" y="75" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">.stream()</text>
    
    <!-- Sorting Funnel visual -->
    <path d="M 35 100 L 95 100 L 75 140 L 55 140 Z" fill="rgba(56, 189, 248, 0.2)" stroke="#38bdf8" stroke-width="1.5" />
    <text x="65" y="123" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#fff" font-weight="bold" text-anchor="middle">SORT</text>
    
    <text x="65" y="170" font-family="'Courier New', monospace" font-size="10" fill="#34d399" font-weight="bold" text-anchor="middle">comparingByValue</text>
    <text x="65" y="185" font-family="'Courier New', monospace" font-size="10" fill="#fb7185" font-weight="bold" text-anchor="middle">Salary (o2, o1)</text>
    <text x="65" y="200" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">descending order</text>
  </g>

  <!-- Connection Arrow 2 -->
  <path d="M 480 240 L 515 240" fill="none" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)" />

  <!-- 3. Output Map Card (LinkedHashMap - Preserves insertion order) -->
  <g transform="translate(530, 110)">
    <rect width="210" height="260" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2" />
    <!-- Header -->
    <rect width="210" height="35" rx="10" fill="#064e3b" opacity="0.4" />
    <text x="105" y="22" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="bold" fill="#a7f3d0" text-anchor="middle">Leaderboard (LinkedHashMap)</text>
    
    <!-- Sorted Entries -->
    <!-- Rank 1: S4 -> 900 -->
    <g transform="translate(15, 55)">
      <rect width="180" height="40" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1.5" filter="url(#glow)" />
      <text x="15" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#fff" font-weight="bold">S4</text>
      <text x="60" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#a7f3d0">➔</text>
      <text x="80" y="24" font-family="'Courier New', monospace" font-size="12" fill="#fff" font-weight="bold">900 (Gold)</text>
    </g>
    <!-- Rank 2: S2 -> 800 -->
    <g transform="translate(15, 105)">
      <rect width="180" height="40" rx="6" fill="#0f172a" stroke="rgba(255,255,255,0.05)" />
      <text x="15" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">S2</text>
      <text x="60" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#94a3b8">➔</text>
      <text x="80" y="24" font-family="'Courier New', monospace" font-size="12" fill="#e2e8f0">800</text>
    </g>
    <!-- Rank 3: S1 -> 500 -->
    <g transform="translate(15, 155)">
      <rect width="180" height="40" rx="6" fill="#0f172a" stroke="rgba(255,255,255,0.05)" />
      <text x="15" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">S1</text>
      <text x="60" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#94a3b8">➔</text>
      <text x="80" y="24" font-family="'Courier New', monospace" font-size="12" fill="#e2e8f0">500</text>
    </g>
    <!-- Rank 4: S3 -> 200 -->
    <g transform="translate(15, 205)">
      <rect width="180" height="40" rx="6" fill="#0f172a" stroke="rgba(255,255,255,0.05)" />
      <text x="15" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">S3</text>
      <text x="60" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#94a3b8">➔</text>
      <text x="80" y="24" font-family="'Courier New', monospace" font-size="12" fill="#e2e8f0">200</text>
    </g>
  </g>

  <!-- Explanation card footer -->
  <rect x="60" y="395" width="680" height="35" rx="6" fill="rgba(30, 41, 59, 0.8)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
  <text x="400" y="416" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#cbd5e1" text-anchor="middle">
    Standard HashMap does not guarantee order. Streaming entries and placing them in a LinkedHashMap preserves the sorted order.
  </text>
</svg>
