<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0822" />
      <stop offset="100%" stop-color="#04020A" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="#1F153C" stroke-width="2"/>
  <text x="400" y="50" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#F0EBF8" text-anchor="middle">Tape Equilibrium Split Sum</text>
  <text x="400" y="75" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5" text-anchor="middle">Minimizing difference between the left and right sum splits of an array</text>
  
  <g transform="translate(100, 150)">
    <!-- Array Boxes -->
    <rect x="0" y="0" width="100" height="60" rx="4" fill="#140F27" stroke="#3A2075" stroke-width="1.5"/>
    <text x="50" y="35" font-family="monospace" font-size="22" fill="#D2C8E3" text-anchor="middle">3</text>
    
    <rect x="110" y="0" width="100" height="60" rx="4" fill="#140F27" stroke="#3A2075" stroke-width="1.5"/>
    <text x="160" y="35" font-family="monospace" font-size="22" fill="#D2C8E3" text-anchor="middle">1</text>
    
    <!-- Split Divider line -->
    <line x1="215" y1="-20" x2="215" y2="80" stroke="#FF5E5E" stroke-width="3" stroke-dasharray="4"/>
    <text x="215" y="-30" font-family="'Segoe UI', sans-serif" font-size="12" fill="#FF5E5E" font-weight="bold" text-anchor="middle">Split Index P</text>

    <rect x="220" y="0" width="100" height="60" rx="4" fill="#140F27" stroke="#3A2075" stroke-width="1.5"/>
    <text x="270" y="35" font-family="monospace" font-size="22" fill="#D2C8E3" text-anchor="middle">2</text>
    
    <rect x="330" y="0" width="100" height="60" rx="4" fill="#140F27" stroke="#3A2075" stroke-width="1.5"/>
    <text x="380" y="35" font-family="monospace" font-size="22" fill="#D2C8E3" text-anchor="middle">4</text>
    
    <rect x="440" y="0" width="100" height="60" rx="4" fill="#140F27" stroke="#3A2075" stroke-width="1.5"/>
    <text x="490" y="35" font-family="monospace" font-size="22" fill="#D2C8E3" text-anchor="middle">3</text>
  </g>

  <!-- Split Sum boxes -->
  <g transform="translate(150, 280)">
    <rect x="0" y="0" width="180" height="70" rx="6" fill="#1A152E" stroke="#5C42A5" stroke-width="1.5"/>
    <text x="90" y="25" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5" text-anchor="middle">Left Sum (3 + 1)</text>
    <text x="90" y="55" font-family="monospace" font-size="24" font-weight="bold" fill="#00FF87" text-anchor="middle">4</text>

    <rect x="320" y="0" width="180" height="70" rx="6" fill="#1A152E" stroke="#5C42A5" stroke-width="1.5"/>
    <text x="410" y="25" font-family="'Segoe UI', sans-serif" font-size="13" fill="#887DA5" text-anchor="middle">Right Sum (2 + 4 + 3)</text>
    <text x="410" y="55" font-family="monospace" font-size="24" font-weight="bold" fill="#00FF87" text-anchor="middle">9</text>

    <!-- Difference -->
    <text x="250" y="45" font-family="'Segoe UI', sans-serif" font-size="14" fill="#FFA5A5" text-anchor="middle">Difference = |4 - 9| = 5</text>
  </g>
</svg>
