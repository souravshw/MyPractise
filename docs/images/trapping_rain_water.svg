<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" width="100%" height="100%">
  <!-- Background Slate -->
  <rect width="100%" height="100%" rx="16" fill="#1e293b"/>
  <!-- Grid overlay -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>

  <text x="250" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="16" fill="#f8fafc" text-anchor="middle">Trapping Rain Water: [3, 0, 1, 2, 0, 4]</text>

  <!-- Elevation profile chart -->
  <g transform="translate(60, 60)" font-family="sans-serif" font-size="11" fill="#94a3b8">
    
    <!-- Water blocks (trapped water) -->
    <!-- Water at idx 1 (x: 55, height: 3, from bottom 160 up to y: 40) -->
    <rect x="55" y="40" width="40" height="120" fill="#38bdf8" fill-opacity="0.6"/>
    <text x="75" y="100" font-weight="bold" fill="#0284c7" text-anchor="middle">3</text>

    <!-- Water at idx 2 (x: 110, height: 2, from bottom 160 up to y: 80 - note element height is 40) -->
    <rect x="110" y="40" width="40" height="80" fill="#38bdf8" fill-opacity="0.6"/>
    <text x="130" y="100" font-weight="bold" fill="#0284c7" text-anchor="middle">2</text>

    <!-- Water at idx 3 (x: 165, height: 1, element height is 80, water level is 120) -->
    <rect x="165" y="40" width="40" height="40" fill="#38bdf8" fill-opacity="0.6"/>
    <text x="185" y="65" font-weight="bold" fill="#0284c7" text-anchor="middle">1</text>

    <!-- Water at idx 4 (x: 220, element height is 0, water level is 120) -->
    <rect x="220" y="40" width="40" height="120" fill="#38bdf8" fill-opacity="0.6"/>
    <text x="240" y="100" font-weight="bold" fill="#0284c7" text-anchor="middle">3</text>

    <!-- Black/Slate Pillars -->
    <!-- Pillar 0: height 3 (120px) -->
    <rect x="0" y="40" width="40" height="120" rx="2" fill="#475569" stroke="rgba(255,255,255,0.1)"/>
    <text x="20" y="30" font-weight="bold" fill="#f8fafc" text-anchor="middle">3</text>
    <text x="20" y="175" fill="#64748b" text-anchor="middle">idx 0</text>
    <text x="20" y="-12" fill="#f43f5e" font-weight="bold" text-anchor="middle">L_Max</text>
    <line x1="20" y1="5" x2="20" y2="35" stroke="#f43f5e" stroke-width="1.5"/>

    <!-- Pillar 1: height 0 -->
    <rect x="55" y="160" width="40" height="0" fill="#475569"/>
    <text x="75" y="175" fill="#64748b" text-anchor="middle">idx 1</text>

    <!-- Pillar 2: height 1 (40px) -->
    <rect x="110" y="120" width="40" height="40" rx="2" fill="#475569" stroke="rgba(255,255,255,0.1)"/>
    <text x="130" y="115" font-weight="bold" fill="#f8fafc" text-anchor="middle">1</text>
    <text x="130" y="175" fill="#64748b" text-anchor="middle">idx 2</text>

    <!-- Pillar 3: height 2 (80px) -->
    <rect x="165" y="80" width="40" height="80" rx="2" fill="#475569" stroke="rgba(255,255,255,0.1)"/>
    <text x="185" y="75" font-weight="bold" fill="#f8fafc" text-anchor="middle">2</text>
    <text x="185" y="175" fill="#64748b" text-anchor="middle">idx 3</text>

    <!-- Pillar 4: height 0 -->
    <rect x="220" y="160" width="40" height="0" fill="#475569"/>
    <text x="240" y="175" fill="#64748b" text-anchor="middle">idx 4</text>

    <!-- Pillar 5: height 4 (160px) -->
    <rect x="275" y="0" width="40" height="160" rx="2" fill="#475569" stroke="rgba(255,255,255,0.1)"/>
    <text x="295" y="-10" font-weight="bold" fill="#f8fafc" text-anchor="middle">4</text>
    <text x="295" y="175" fill="#64748b" text-anchor="middle">idx 5</text>
    <text x="295" y="-27" fill="#a855f7" font-weight="bold" text-anchor="middle">R_Max</text>
    <line x1="295" y1="-22" x2="295" y2="-12" stroke="#a855f7" stroke-width="1.5"/>

    <!-- Water Boundary Level Indicator -->
    <line x1="0" y1="40" x2="275" y2="40" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text x="135" y="32" fill="#0284c7" font-size="10" font-weight="bold" text-anchor="middle">Water Level = min(L_Max, R_Max) = 3</text>
  </g>

  <!-- Explanation footer -->
  <g transform="translate(40, 260)" font-family="sans-serif" font-size="12" fill="#94a3b8">
    <text x="210" y="0" font-weight="bold" fill="#f8fafc" text-anchor="middle">Formula for water trapped at index i:</text>
    <text x="210" y="18" font-family="monospace" font-size="13" fill="#38bdf8" text-anchor="middle">water[i] = Math.min(leftMax[i], rightMax[i]) - height[i]</text>
    <text x="210" y="36" font-size="11" fill="#64748b" text-anchor="middle">Total Trapped Water in this section = 3 + 2 + 1 + 3 = 9 units.</text>
  </g>
</svg>
